<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <title>Mini FlyRadar con Clustering</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Leaflet base -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <!-- MarkerCluster CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #eee;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    header {
      padding: 8px 12px;
      background: #181818;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 14px;
    }
    header .title {
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    header .status {
      font-size: 12px;
      color: #aaa;
    }
    #map {
      flex: 1;
      width: 100%;
    }
    .leaflet-container {
      background: #000;
    }

    .sidebar {
      position: absolute;
      top: 56px;
      right: 8px;
      width: 260px;
      max-height: calc(100% - 64px);
      background: rgba(15,15,15,0.95);
      border-radius: 8px;
      border: 1px solid #333;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      pointer-events: auto;
      z-index: 1000;
    }
    .sidebar-header {
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 600;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sidebar-body {
      padding: 6px 8px;
      font-size: 12px;
      overflow-y: auto;
      flex: 1;
    }
    .info-line {
      font-size: 11px;
      color: #aaa;
      margin-top: 2px;
    }
    .flight-row {
      padding: 4px 0;
      border-bottom: 1px solid #222;
      cursor: pointer;
    }
    .flight-row:last-child {
      border-bottom: none;
    }
    .flight-row:hover {
      background: rgba(255,255,255,0.03);
    }
    .flight-main {
      font-weight: 600;
      font-size: 12px;
    }
    .flight-sub {
      font-size: 11px;
      color: #bbb;
    }
    .badge {
      display: inline-block;
      padding: 1px 5px;
      border-radius: 999px;
      background: #333;
      margin-left: 4px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .aircraft-icon {
      width: 20px;
      height: 20px;
      transform-origin: 50% 50%;
    }
    .aircraft-icon svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 3px rgba(0,0,0,0.8));
    }

    /* CLUSTER STYLE */
    .marker-cluster-small {
      background-color: rgba(255, 213, 0, 0.7);
    }
    .marker-cluster-small div {
      background-color: #ffd500;
      color: #000;
    }
    .marker-cluster-medium {
      background-color: rgba(255, 213, 0, 0.8);
    }
    .marker-cluster-medium div {
      background-color: #ffd500;
      color: #000;
    }
    .marker-cluster-large {
      background-color: rgba(255, 213, 0, 0.9);
    }
    .marker-cluster-large div {
      background-color: #ffd500;
      color: #000;
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="title">Mini FlyRadar con Clustering</div>
    <div class="status">
      <span id="fetchStatus">In attesa dati voli…</span>
    </div>
  </header>
  <div id="map"></div>

  <div class="sidebar">
    <div class="sidebar-header">
      <span>Voli ricevuti (mondo intero)</span>
      <span id="flightCount">0</span>
    </div>
    <div class="sidebar-body" id="flightList">
      <div class="info-line">
        Caricamento da OpenSky Network… (clustering attivo)
      </div>
    </div>
  </div>
</div>

<!-- Leaflet JS -->
<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin=""
></script>

<!-- MarkerCluster JS -->
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<script>
  const OPENSKY_URL = "https://opensky-network.org/api/states/all"; // [web:3]
  const REFRESH_MS = 15000;

  let map;
  let aircraftClusterGroup;  // ← CLUSTER invece di layerGroup
  let aircraftMarkers = new Map();
  let lastStates = [];

  const elFetchStatus = document.getElementById("fetchStatus");
  const elFlightList = document.getElementById("flightList");
  const elFlightCount = document.getElementById("flightCount");

  // MAPPA SISTEMATA
  function initMap() {
    map = L.map("map", {
      zoomControl: true,
    }).setView([45.0, 8.0], 5);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 10,
      minZoom: 2,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
    }).addTo(map);

    // CLUSTER GROUP invece di layerGroup normale
    aircraftClusterGroup = L.markerClusterGroup({
      maxClusterRadius: 50,
      disableClusteringAtZoom: 8,  // smette di clusterizzare a zoom 8+
      spiderfyOnMaxZoom: true,
      zoomToBoundsOnClick: true,
      polygonOptions: {
        color: '#ffd500',
        weight: 1
      }
    }).addTo(map);

    map.setMaxBounds([
      [-85, -180],
      [85, 180]
    ]);

    setTimeout(() => {
      map.invalidateSize();
    }, 300);
  }

  async function fetchAllTraffic() {
    try {
      elFetchStatus.textContent = "Carico tutti i voli dal mondo…";
      const resp = await fetch(OPENSKY_URL);
      if (!resp.ok) {
        throw new Error("Errore OpenSky: " + resp.status);
      }
      const data = await resp.json();
      lastStates = Array.isArray(data.states) ? data.states : [];
      updateAircraftMarkers(lastStates);
      updateSidebar(lastStates);
      elFetchStatus.textContent = `Ultimo aggiornamento: ${new Date().toLocaleTimeString()}`;
    } catch (err) {
      console.error("Errore fetch OpenSky:", err);
      elFetchStatus.textContent = "Errore caricamento voli (API o rete).";
    }
  }

  function createAircraftIcon(trackDeg) {
    const rotation = typeof trackDeg === "number" ? trackDeg : 0;

    const svg = `
      <div class="aircraft-icon" style="transform: rotate(${rotation}deg);">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <g fill="#ffd500">
            <path d="M12 2c-.4 0-.77.24-.92.62L9.2 8.5 4 10.5v1l4.5-.5L11 15l-2.5 2-2 .5v1l3-.3L12 17l2.5 1.2 3 .3v-1l-2-.5L13 15l2.5-4.5L20 11.5v-1L14.8 8.5 12.92 2.62A1 1 0 0 0 12 2z"/>
          </g>
        </svg>
      </div>
    `;

    return L.divIcon({
      html: svg,
      className: "",
      iconSize: [24, 24],
      iconAnchor: [12, 12]
    });
  }

  function updateAircraftMarkers(states) {
    // Pulisci TUTTI i marker dal cluster (riaggiunge solo quelli nuovi)
    aircraftClusterGroup.clearLayers();

    // Ricrea i marker
    states.forEach(s => {
      if (!s || s.length < 7) return;
      const icao24 = s[0];
      const lon = s[5];
      const lat = s[6];
      const track = s[10];

      if (typeof lat !== "number" || typeof lon !== "number") return;

      const pos = [lat, lon];
      const icon = createAircraftIcon(track);

      const marker = L.marker(pos, { icon });
      marker._flightData = s;
      marker.bindPopup(buildPopupHtml(s));
      marker.on("click", () => marker.openPopup());

      aircraftClusterGroup.addLayer(marker); // ← Aggiunge al CLUSTER
    });
  }

  function buildPopupHtml(state) {
    const icao24 = state[0];
    const callsign = (state[1] || "").trim() || "Senza callsign";
    const origin = state[2] || "N/D";
    const lon = state[5];
    const lat = state[6];
    const baroAlt = state[7];
    const onGround = state[8];
    const velocity = state[9];
    const track = state[10];

    const altFt = typeof baroAlt === "number" ? (baroAlt * 3.28084).toFixed(0) + " ft" : "N/D";
    const spdKts = typeof velocity === "number" ? (velocity * 1.94384).toFixed(0) + " kt" : "N/D";
    const hdg = typeof track === "number" ? track.toFixed(0) + "°" : "N/D";
    const posStr = (typeof lat === "number" && typeof lon === "number")
      ? `${lat.toFixed(3)}, ${lon.toFixed(3)}`
      : "N/D";

    return `
      <div style="min-width: 190px;">
        <div style="font-weight:600;font-size:13px;">${callsign}</div>
        <div style="font-size:11px;color:#777;">ICAO24: ${icao24.toUpperCase()}</div>
        <div style="margin-top:6px;font-size:11px;">
          <div><strong>Origine:</strong> ${origin}</div>
          <div><strong>Quota:</strong> ${altFt}</div>
          <div><strong>Velocit&agrave;:</strong> ${spdKts}</div>
          <div><strong>Prua:</strong> ${hdg}</div>
          <div><strong>Posizione:</strong> ${posStr}</div>
          <div style="margin-top:4px;"><strong>Stato:</strong> ${onGround ? "A terra" : "In volo"}</div>
        </div>
        <div style="margin-top:6px;font-size:10px;color:#999;">
          Dati via OpenSky Network (solo uso non commerciale).
        </div>
      </div>
    `;
  }

  function updateSidebar(states) {
    elFlightList.innerHTML = "";

    const valid = states.filter(s => {
      if (!s || s.length < 7) return false;
      const lon = s[5];
      const lat = s[6];
      return typeof lat === "number" && typeof lon === "number";
    });

    elFlightCount.textContent = valid.length.toString();

    if (valid.length === 0) {
      const div = document.createElement("div");
      div.className = "info-line";
      div.textContent = "Nessun volo valido ricevuto (forse limiti API).";
      elFlightList.appendChild(div);
      return;
    }

    valid.slice(0, 150).forEach(s => {
      const icao24 = s[0];
      const callsign = (s[1] || "").trim() || "Senza callsign";
      const origin = s[2] || "N/D";
      const baroAlt = s[7];
      const velocity = s[9];
      const onGround = s[8];

      const altFt = typeof baroAlt === "number" ? (baroAlt * 3.28084).toFixed(0) + " ft" : "N/D";
      const spdKts = typeof velocity === "number" ? (velocity * 1.94384).toFixed(0) + " kt" : "N/D";

      const row = document.createElement("div");
      row.className = "flight-row";
      row.innerHTML = `
        <div class="flight-main">
          ${callsign}
          <span class="badge">${onGround ? "GND" : "FLY"}</span>
        </div>
        <div class="flight-sub">
          ${origin} · ${altFt} · ${spdKts}
        </div>
      `;
      row.onclick = () => {
        const centerLat = s[6];
        const centerLon = s[5];
        if (typeof centerLat === "number" && typeof centerLon === "number") {
          map.setView([centerLat, centerLon], Math.max(map.getZoom(), 8), { animate: true });
        }
      };
      elFlightList.appendChild(row);
    });
  }

  (async function main() {
    initMap();
    await fetchAllTraffic();
    setInterval(fetchAllTraffic, REFRESH_MS);
  })();
</script>
</body>
</html>
