<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <title>Mini FlyRadar Nord Italia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #eee;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    header {
      padding: 8px 12px;
      background: #181818;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 14px;
      z-index: 999;
      position: relative;
    }
    header .title {
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    header .status {
      font-size: 12px;
      color: #aaa;
    }
    #map {
      flex: 1;
      width: 100%;
    }
    .leaflet-container {
      background: #1a1a2e;
    }

    /* CLUSTER personalizzato giallo */
    .marker-cluster-small {
      background-color: rgba(255, 213, 0, 0.5);
    }
    .marker-cluster-small div {
      background-color: rgba(255, 213, 0, 0.85);
      color: #000;
      font-weight: 700;
    }
    .marker-cluster-medium {
      background-color: rgba(255, 180, 0, 0.5);
    }
    .marker-cluster-medium div {
      background-color: rgba(255, 180, 0, 0.85);
      color: #000;
      font-weight: 700;
    }
    .marker-cluster-large {
      background-color: rgba(255, 120, 0, 0.5);
    }
    .marker-cluster-large div {
      background-color: rgba(255, 120, 0, 0.85);
      color: #000;
      font-weight: 700;
    }

    /* ICONA AEREO */
    .aircraft-icon {
      width: 22px;
      height: 22px;
      transform-origin: 50% 50%;
    }
    .aircraft-icon svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 3px rgba(0,0,0,0.9));
    }

    /* SIDEBAR */
    .sidebar {
      position: absolute;
      top: 56px;
      right: 8px;
      width: 270px;
      max-height: calc(100% - 70px);
      background: rgba(12,12,12,0.96);
      border-radius: 10px;
      border: 1px solid #333;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      pointer-events: auto;
      z-index: 1000;
    }
    .sidebar-header {
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 700;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #161616;
    }
    .sidebar-header .count-badge {
      background: #ffd500;
      color: #000;
      font-weight: 700;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
    }
    .sidebar-body {
      padding: 6px 8px;
      font-size: 12px;
      overflow-y: auto;
      flex: 1;
    }
    .info-line {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
      padding: 4px 0;
    }
    .flight-row {
      padding: 5px 4px;
      border-bottom: 1px solid #1f1f1f;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.1s;
    }
    .flight-row:last-child {
      border-bottom: none;
    }
    .flight-row:hover {
      background: rgba(255,255,255,0.04);
    }
    .flight-main {
      font-weight: 700;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .flight-sub {
      font-size: 11px;
      color: #888;
      margin-top: 1px;
    }
    .badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 999px;
      background: #2a2a2a;
      margin-left: 4px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }
    .badge-fly {
      background: rgba(0, 200, 100, 0.2);
      color: #00c864;
    }
    .badge-gnd {
      background: rgba(255, 100, 100, 0.2);
      color: #ff6464;
    }

    /* POPUP */
    .leaflet-popup-content-wrapper {
      background: #1a1a1a;
      color: #eee;
      border: 1px solid #333;
      border-radius: 8px;
    }
    .leaflet-popup-tip {
      background: #1a1a1a;
    }
    .leaflet-popup-close-button {
      color: #aaa !important;
    }

    @media (max-width: 600px) {
      .sidebar {
        width: 200px;
      }
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="title">✈ Mini FlyRadar — Nord Italia / Torino</div>
    <div class="status" id="fetchStatus">In attesa dati voli…</div>
  </header>
  <div id="map"></div>

  <div class="sidebar">
    <div class="sidebar-header">
      <span>Traffico aereo area</span>
      <span class="count-badge" id="flightCount">0</span>
    </div>
    <div class="sidebar-body" id="flightList">
      <div class="info-line">Caricamento voli in corso…</div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<script>
  // ==== CONFIGURAZIONE ====
  // bbox Nord Italia / Svizzera / Riviera (1 credito per richiesta, non 4)
  const BBOX = { lamin: 43.5, lamax: 48.5, lomin: 5.0, lomax: 13.5 };
  const OPENSKY_URL = "https://opensky-network.org/api/states/all";
  const REFRESH_MS = 20000; // 20s: riduce consumo crediti API

  let map;
  let clusterGroup;
  let lastStates = [];

  const elFetchStatus = document.getElementById("fetchStatus");
  const elFlightList  = document.getElementById("flightList");
  const elFlightCount = document.getElementById("flightCount");

  // ==== MAPPA ====
  function initMap() {
    map = L.map("map", { zoomControl: true })
           .setView([45.07, 7.68], 6); // centrata su Torino

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 12,
      minZoom: 3,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    map.setMaxBounds([[-85, -180], [85, 180]]);

    // CLUSTER GROUP
    clusterGroup = L.markerClusterGroup({
      maxClusterRadius: 45,
      disableClusteringAtZoom: 9,
      spiderfyOnMaxZoom: true,
      zoomToBoundsOnClick: true,
      polygonOptions: { color: "#ffd500", weight: 1, fillOpacity: 0.05 }
    });

    map.addLayer(clusterGroup);

    setTimeout(() => map.invalidateSize(), 300);
  }

  // ==== ICONA AEREO SVG ====
  function createAircraftIcon(trackDeg) {
    const rotation = typeof trackDeg === "number" ? trackDeg : 0;
    return L.divIcon({
      html: `
        <div class="aircraft-icon" style="transform: rotate(${rotation}deg);">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path fill="#ffd500" d="M12 2c-.4 0-.77.24-.92.62L9.2 8.5 4 10.5v1l4.5-.5L11 15l-2.5 2-2 .5v1l3-.3L12 17l2.5 1.2 3 .3v-1l-2-.5L13 15l2.5-4.5L20 11.5v-1L14.8 8.5 12.92 2.62A1 1 0 0 0 12 2z"/>
          </svg>
        </div>`,
      className: "",
      iconSize: [22, 22],
      iconAnchor: [11, 11]
    });
  }

  // ==== FETCH VOLI (bbox Nord Italia, 1 credito/chiamata) ====
  async function fetchTraffic() {
    const url = `${OPENSKY_URL}?lamin=${BBOX.lamin}&lomin=${BBOX.lomin}&lamax=${BBOX.lamax}&lomax=${BBOX.lomax}`;
    try {
      elFetchStatus.textContent = "Caricamento voli…";
      const resp = await fetch(url);

      if (resp.status === 429) {
        elFetchStatus.textContent = "⚠ Rate limit API raggiunto. Riprovo tra poco…";
        return;
      }
      if (!resp.ok) {
        throw new Error("HTTP " + resp.status);
      }

      const data = await resp.json();
      lastStates = Array.isArray(data.states) ? data.states : [];

      renderMarkers(lastStates);
      renderSidebar(lastStates);

      elFetchStatus.textContent = `✓ ${lastStates.length} voli — ${new Date().toLocaleTimeString()}`;
    } catch (err) {
      console.error("Errore fetch OpenSky:", err);
      elFetchStatus.textContent = "✗ Errore API. Nuovo tentativo tra 20s…";
    }
  }

  // ==== RENDER MARKER ====
  function renderMarkers(states) {
    clusterGroup.clearLayers();

    const batch = [];

    states.forEach(s => {
      if (!s || s.length < 7) return;
      const lon   = s[5];
      const lat   = s[6];
      const track = s[10];

      if (typeof lat !== "number" || typeof lon !== "number") return;

      const marker = L.marker([lat, lon], { icon: createAircraftIcon(track) });
      marker.bindPopup(buildPopup(s), { maxWidth: 220 });
      batch.push(marker);
    });

    clusterGroup.addLayers(batch); // addLayers (bulk) è molto più veloce di addLayer in loop
  }

  // ==== POPUP ====
  function buildPopup(s) {
    const icao24   = (s[0] || "").toUpperCase();
    const callsign = (s[1] || "").trim() || "Senza callsign";
    const country  = s[2]  || "N/D";
    const baroAlt  = s[7];
    const onGround = s[8];
    const velocity = s[9];
    const track    = s[10];
    const lat      = s[6];
    const lon      = s[5];

    const altFt  = typeof baroAlt  === "number" ? (baroAlt * 3.28084).toFixed(0) + " ft" : "N/D";
    const spdKts = typeof velocity  === "number" ? (velocity * 1.94384).toFixed(0) + " kt" : "N/D";
    const hdg    = typeof track     === "number" ? track.toFixed(0) + "°" : "N/D";
    const pos    = (typeof lat === "number" && typeof lon === "number")
                   ? `${lat.toFixed(3)}, ${lon.toFixed(3)}`
                   : "N/D";

    return `
      <div style="font-family:system-ui,sans-serif;">
        <div style="font-weight:700;font-size:14px;margin-bottom:4px;">${callsign}</div>
        <div style="font-size:10px;color:#888;margin-bottom:8px;">ICAO24: ${icao24}</div>
        <table style="font-size:11px;border-collapse:collapse;width:100%;">
          <tr><td style="color:#888;padding:2px 6px 2px 0;">Paese</td><td>${country}</td></tr>
          <tr><td style="color:#888;padding:2px 6px 2px 0;">Quota</td><td>${altFt}</td></tr>
          <tr><td style="color:#888;padding:2px 6px 2px 0;">Velocità</td><td>${spdKts}</td></tr>
          <tr><td style="color:#888;padding:2px 6px 2px 0;">Prua</td><td>${hdg}</td></tr>
          <tr><td style="color:#888;padding:2px 6px 2px 0;">Posizione</td><td>${pos}</td></tr>
          <tr><td style="color:#888;padding:2px 6px 2px 0;">Stato</td><td>${onGround ? "🔴 A terra" : "🟢 In volo"}</td></tr>
        </table>
        <div style="font-size:9px;color:#555;margin-top:8px;">Dati: OpenSky Network (non commerciale)</div>
      </div>
    `;
  }

  // ==== SIDEBAR ====
  function renderSidebar(states) {
    elFlightList.innerHTML = "";

    const valid = states.filter(s => {
      if (!s || s.length < 7) return false;
      return typeof s[6] === "number" && typeof s[5] === "number";
    });

    elFlightCount.textContent = valid.length;

    if (valid.length === 0) {
      elFlightList.innerHTML = `<div class="info-line">Nessun volo nell'area.</div>`;
      return;
    }

    valid.slice(0, 150).forEach(s => {
      const callsign = (s[1] || "").trim() || "Senza callsign";
      const country  = s[2]  || "N/D";
      const baroAlt  = s[7];
      const velocity = s[9];
      const onGround = s[8];
      const lat = s[6];
      const lon = s[5];

      const altFt  = typeof baroAlt  === "number" ? (baroAlt * 3.28084).toFixed(0) + " ft" : "N/D";
      const spdKts = typeof velocity  === "number" ? (velocity * 1.94384).toFixed(0) + " kt" : "N/D";

      const row = document.createElement("div");
      row.className = "flight-row";
      row.innerHTML = `
        <div class="flight-main">
          ${callsign}
          <span class="badge ${onGround ? "badge-gnd" : "badge-fly"}">${onGround ? "GND" : "FLY"}</span>
        </div>
        <div class="flight-sub">${country} · ${altFt} · ${spdKts}</div>
      `;
      row.onclick = () => {
        if (typeof lat === "number" && typeof lon === "number") {
          map.setView([lat, lon], 10, { animate: true });
        }
      };
      elFlightList.appendChild(row);
    });
  }

  // ==== AVVIO ====
  (async function main() {
    initMap();
    await fetchTraffic();
    setInterval(fetchTraffic, REFRESH_MS);
  })();
</script>
</body>
</html>
