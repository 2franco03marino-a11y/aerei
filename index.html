<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>FlyRadar + MarineRadar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#09090f">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-velocity@2.1.0/dist/leaflet-velocity.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#09090f;color:#eee;font-family:system-ui,-apple-system,sans-serif;touch-action:manipulation}

/* ── TOP BAR ── */
#topbar{
  position:fixed;top:0;left:0;right:0;
  height:env(safe-area-inset-top, 0px);
  background:#09090f;z-index:4000;
}
#header{
  position:fixed;
  top:env(safe-area-inset-top,0px);
  left:0;right:0;height:52px;
  background:rgba(12,12,24,.97);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid #181830;
  display:flex;align-items:center;
  padding:0 12px;gap:8px;
  z-index:3000;
}
.title{font-size:13px;font-weight:800;white-space:nowrap;letter-spacing:.02em;flex-shrink:0}
#status{
  font-size:10px;color:#444;flex:1;text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#btns{display:flex;gap:4px;flex-shrink:0}
.btn{
  font-size:11px;font-weight:700;
  padding:5px 10px;border-radius:99px;
  border:1px solid #1e1e30;background:#111;color:#555;
  cursor:pointer;transition:all .2s;white-space:nowrap;
  outline:none;min-height:32px;
  -webkit-touch-callout:none;user-select:none;
}
.btn.air-on {background:#ffd500;color:#000;border-color:#ffd500}
.btn.sea-on {background:#00b4d8;color:#000;border-color:#00b4d8}
.btn.wind-on{background:#a855f7;color:#fff;border-color:#a855f7}

/* ── MAPPA ── */
#map{
  position:fixed;
  top:calc(env(safe-area-inset-top,0px) + 52px);
  left:0;right:0;
  bottom:calc(env(safe-area-inset-bottom,0px) + 56px);
  z-index:1;
}

/* ── BOTTOM NAV (mobile) ── */
#bottom-nav{
  position:fixed;
  bottom:env(safe-area-inset-bottom,0px);
  left:0;right:0;height:56px;
  background:rgba(12,12,24,.97);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-top:1px solid #181830;
  display:flex;align-items:center;justify-content:space-around;
  padding:0 8px;z-index:3000;gap:4px;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;padding:4px 2px;border-radius:10px;cursor:pointer;
  min-height:48px;transition:background .15s;
  user-select:none;-webkit-tap-highlight-color:transparent;
}
.nav-btn:active{background:rgba(255,255,255,.05)}
.nav-ico{font-size:20px;line-height:1}
.nav-lbl{font-size:9px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.05em}
.nav-btn.air-on .nav-lbl{color:#ffd500}
.nav-btn.sea-on .nav-lbl{color:#00b4d8}
.nav-btn.wind-on .nav-lbl{color:#a855f7}
.nav-btn.list-on .nav-lbl{color:#eee}

/* ── SHEET (lista, filtri) — slide dal basso ── */
#sheet{
  position:fixed;left:0;right:0;
  bottom:calc(env(safe-area-inset-bottom,0px) + 56px);
  height:50vh;
  background:rgba(10,10,20,.99);
  border-top:1px solid #181830;
  border-radius:16px 16px 0 0;
  z-index:2500;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
  overflow:hidden;
  will-change:transform;
}
#sheet.open{transform:translateY(0)}
#sheet-handle{
  width:36px;height:4px;background:#2a2a3a;
  border-radius:2px;margin:10px auto 6px;flex-shrink:0;
}
#sheet-head{
  display:flex;justify-content:space-between;align-items:center;
  padding:0 14px 8px;flex-shrink:0;border-bottom:1px solid #141425;
}
#sb-title{font-size:13px;font-weight:700}
#sb-count{
  font-size:11px;font-weight:700;padding:2px 9px;
  border-radius:99px;background:#ffd500;color:#000;
}
#filters{
  padding:8px 12px;border-bottom:1px solid #141425;
  flex-shrink:0;overflow-x:auto;
  scrollbar-width:none;
}
#filters::-webkit-scrollbar{display:none}
.fg{display:flex;gap:6px;white-space:nowrap}
.fb{
  font-size:11px;font-weight:600;padding:5px 12px;border-radius:99px;
  border:1px solid #181830;background:#0d0d1c;color:#505060;
  cursor:pointer;flex-shrink:0;min-height:32px;
  user-select:none;transition:all .15s;
}
.fb.on    {background:#ffd500;color:#000;border-color:#ffd500}
.fb.on-mil{background:#4caf50;color:#000;border-color:#4caf50}
.fb.on-gnd{background:#ff5555;color:#fff;border-color:#ff5555}
.fb.on-sea{background:#00b4d8;color:#000;border-color:#00b4d8}
#sb-list{overflow-y:auto;flex:1;padding:4px 12px;-webkit-overflow-scrolling:touch}
.fr{
  padding:10px 4px;border-bottom:1px solid #0f0f1a;
  cursor:pointer;border-radius:6px;
  display:flex;align-items:center;gap:8px;
}
.fr:active{background:rgba(255,255,255,.04)}
.fr:last-child{border-bottom:none}
.fr-ico{font-size:18px;flex-shrink:0}
.fr-info{flex:1;min-width:0}
.fn{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fn-row{display:flex;align-items:center;gap:4px;margin-bottom:2px}
.fs{font-size:11px;color:#383850}
.b{font-size:9px;padding:1px 6px;border-radius:99px;font-weight:700;text-transform:uppercase;flex-shrink:0}
.b-f{background:rgba(0,200,80,.1);color:#00c864}
.b-g{background:rgba(255,80,80,.1);color:#ff5050}
.b-m{background:rgba(76,175,80,.12);color:#4caf50}
.b-s{background:rgba(0,180,216,.12);color:#00b4d8}
.empty{font-size:12px;color:#2a2a3a;padding:16px 4px;text-align:center}

/* ── DETAIL PANEL — slide dal basso full ── */
#detail{
  position:fixed;left:0;right:0;
  bottom:calc(env(safe-area-inset-bottom,0px) + 56px);
  height:70vh;
  background:rgba(9,9,20,.99);
  border-top:1px solid #181830;
  border-radius:20px 20px 0 0;
  z-index:3500;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
  overflow:hidden;
}
#detail.show{transform:translateY(0)}
#det-drag{
  width:36px;height:4px;background:#2a2a3a;
  border-radius:2px;margin:10px auto 0;flex-shrink:0;
}
#det-x{
  position:absolute;top:10px;right:12px;
  cursor:pointer;font-size:14px;color:#555;z-index:5;
  background:rgba(0,0,0,.7);border-radius:50%;
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
}
#det-scroll{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
#det-img{
  width:100%;height:180px;background:#060612;
  position:relative;overflow:hidden;flex-shrink:0;
}
#det-img img{width:100%;height:100%;object-fit:cover;display:block}
.ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#2a2a3a;gap:6px}
.ph .ico{font-size:44px}.ph span{font-size:12px}
#det-body{padding:14px 16px 20px}
#det-cs{font-size:20px;font-weight:800;margin-bottom:3px}
#det-id{font-size:11px;color:#383850;margin-bottom:10px}
#det-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.tag{font-size:10px;font-weight:700;padding:3px 10px;border-radius:99px;text-transform:uppercase}
.t-fly{background:rgba(0,200,80,.1);color:#00c864}
.t-gnd{background:rgba(255,80,80,.1);color:#ff5050}
.t-mil{background:rgba(76,175,80,.15);color:#4caf50}
.t-civ{background:rgba(100,160,255,.1);color:#64a0ff}
.t-sea{background:rgba(0,180,216,.12);color:#00b4d8}
#det-desc{
  font-size:12px;color:#505060;line-height:1.7;
  margin-bottom:14px;font-style:italic;
  border-left:3px solid #181830;padding-left:10px;display:none;
}
.det-row{
  display:flex;align-items:center;
  padding:10px 0;border-bottom:1px solid #0f0f1a;
}
.det-row:last-child{border-bottom:none}
.det-lbl{font-size:11px;color:#383850;width:80px;flex-shrink:0}
.det-val{font-size:13px;color:#ddd;font-weight:600;flex:1}
#det-credit{font-size:10px;color:#202030;margin-top:16px;text-align:right}

/* CLUSTER */
.marker-cluster-small  {background:rgba(255,213,0,.25)}
.marker-cluster-small div  {background:rgba(255,213,0,.9);color:#000;font-weight:700}
.marker-cluster-medium {background:rgba(255,170,0,.25)}
.marker-cluster-medium div {background:rgba(255,170,0,.9);color:#000;font-weight:700}
.marker-cluster-large  {background:rgba(255,100,0,.25)}
.marker-cluster-large div  {background:rgba(255,100,0,.9);color:#000;font-weight:700}

.leaflet-popup-content-wrapper{display:none!important}
.leaflet-control-zoom{margin-bottom:8px!important;margin-right:8px!important}
.leaflet-control-zoom a{width:36px!important;height:36px!important;line-height:36px!important;font-size:18px!important;background:rgba(12,12,24,.95)!important;color:#eee!important;border-color:#181830!important}
.leaflet-control-velocity{background:rgba(9,9,20,.85)!important;color:#a855f7!important;border:1px solid #a855f720!important;border-radius:8px!important;padding:4px 10px!important;font-size:10px!important;font-weight:600!important}
</style>
</head>
<body>

<!-- Safe area top -->
<div id="topbar"></div>

<div id="header">
  <span class="title">✈ FlyRadar</span>
  <span id="status">Avvio…</span>
  <!-- Su mobile i bottoni principali sono nella bottom nav -->
  <!-- Qui solo stato/titolo -->
</div>

<div id="map"></div>

<!-- BOTTOM NAV -->
<div id="bottom-nav">
  <div class="nav-btn air-on" id="nav-air" onclick="setMode('air')">
    <span class="nav-ico">✈</span>
    <span class="nav-lbl">Aerei</span>
  </div>
  <div class="nav-btn" id="nav-sea" onclick="setMode('sea')">
    <span class="nav-ico">⛵</span>
    <span class="nav-lbl">Navi</span>
  </div>
  <div class="nav-btn" id="nav-wind" onclick="toggleWind()">
    <span class="nav-ico">💨</span>
    <span class="nav-lbl">Vento</span>
  </div>
  <div class="nav-btn" id="nav-list" onclick="toggleSheet()">
    <span class="nav-ico">☰</span>
    <span class="nav-lbl">Lista</span>
  </div>
</div>

<!-- BOTTOM SHEET (lista voli/navi) -->
<div id="sheet">
  <div id="sheet-handle"></div>
  <div id="sheet-head">
    <span id="sb-title">Voli area locale</span>
    <span id="sb-count">0</span>
  </div>
  <div id="filters"><div class="fg" id="fg"></div></div>
  <div id="sb-list"><div class="empty">Caricamento…</div></div>
</div>

<!-- DETAIL PANEL (slide dal basso) -->
<div id="detail">
  <div id="det-drag"></div>
  <div id="det-x" onclick="closeDetail()">✕</div>
  <div id="det-scroll">
    <div id="det-img"><div class="ph"><span class="ico">✈</span><span>Caricamento…</span></div></div>
    <div id="det-body">
      <div id="det-cs">—</div>
      <div id="det-id">—</div>
      <div id="det-tags"></div>
      <div id="det-desc"></div>
      <div class="det-row"><span class="det-lbl">Paese</span><span class="det-val" id="d-c">—</span></div>
      <div class="det-row" id="row-alt"><span class="det-lbl">Quota</span><span class="det-val" id="d-a">—</span></div>
      <div class="det-row"><span class="det-lbl">Velocità</span><span class="det-val" id="d-s">—</span></div>
      <div class="det-row"><span class="det-lbl">Prua</span><span class="det-val" id="d-h">—</span></div>
      <div class="det-row"><span class="det-lbl">Posizione</span><span class="det-val" id="d-p">—</span></div>
      <div class="det-row"><span class="det-lbl">Stato</span><span class="det-val" id="d-g">—</span></div>
      <div id="det-credit">Foto: Planespotters.net · Dati: OpenSky / AIS</div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet-velocity@2.1.0/dist/leaflet-velocity.js"></script>

<script>
// ══════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════
const OPENSKY  = "https://opensky-network.org/api/states/all";
const AIR_BBOX = {lamin:43.5,lamax:48.5,lomin:5.0, lomax:13.5};
const SEA_BBOX = {lamin:36.0,lamax:48.0,lomin:4.0, lomax:20.0};
const AISSTREAM_KEY = ""; // opzionale, gratis su aisstream.io con GitHub

// ══════════════════════════════════════════════════════════
// STATO
// ══════════════════════════════════════════════════════════
let map, cluster, trailLayer, windLayer;
let lastAir=[], lastSea=[];
let mode="air", windOn=false, sheetOpen=false;
let airTimer=null, seaTimer=null;

const MIL_PREFIXES  = ["ae","a1","a2","a3","a4","a5","43c","43d","43e","43f","3b7","3b8","3b9","3ba","3bb","43b","43a","4240","4241","4242","4243","4244","4245","300","301","302","500","501"];
const MIL_CALLSIGNS = ["RCH","DUKE","REACH","JAKE","FURY","VIPER","GHOST","EAGLE","VENUS","MARS","ATLAS","MAGMA","TOPGUN","KNIFE","IRON","STEEL","AMI","IAM","GAF","RAF","USAF","NAVY"];
const AIRLINE_DESC  = {
  "RYR":"Ryanair — low-cost irlandese, tra le più grandi d'Europa.",
  "EZY":"easyJet — low-cost britannica, molto attiva in Italia.",
  "AZA":"ITA Airways — compagnia di bandiera italiana.",
  "BAW":"British Airways — compagnia di bandiera UK.",
  "DLH":"Lufthansa — compagnia di bandiera tedesca.",
  "AFR":"Air France — compagnia di bandiera francese.",
  "UAE":"Emirates — compagnia degli Emirati Arabi.",
  "SWR":"Swiss International Air Lines.",
  "VOL":"Volotea — low-cost spagnola, molte rotte italiane.",
  "WZZ":"Wizz Air — low-cost ungherese.",
  "VLG":"Vueling — low-cost spagnola gruppo IAG.",
  "AMI":"Aeronautica Militare Italiana.",
  "RCH":"US Air Force — volo militare americano.",
  "GAF":"German Air Force — militare tedesco.",
  "RAF":"Royal Air Force — militare britannico.",
};
const airF={civil:true,mil:true,fly:true,gnd:false,heavy:false};
const seaF={cargo:true,tanker:true,passenger:true,military:true,other:true};

// ══════════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════════
const ms2k = v=>typeof v==="number"?(v*3.6).toFixed(0)+" km/h":"—";
const m2ft  = v=>typeof v==="number"?(v*3.28084).toFixed(0)+" ft":"—";
const kn2k  = v=>typeof v==="number"?(v*1.852).toFixed(0)+" km/h":"—";
const $     = id=>document.getElementById(id);
const setT  = (id,v)=>$(id).textContent=v;

function isMil(s){
  const ic=(s[0]||"").toLowerCase(),cs=(s[1]||"").trim().toUpperCase();
  return MIL_PREFIXES.some(p=>ic.startsWith(p))||MIL_CALLSIGNS.some(p=>cs.startsWith(p));
}
function isHeavy(s){
  const c=s.length>=18?s[17]:null;
  if(typeof c==="number")return c===5||c===6;
  return typeof s[7]==="number"&&s[7]>9000&&typeof s[9]==="number"&&s[9]>220;
}
function passAir(s){
  const m=isMil(s),g=s[8];
  if(!airF.civil&&!m)return false;
  if(!airF.mil&&m)return false;
  if(!airF.fly&&!g)return false;
  if(!airF.gnd&&g)return false;
  if(airF.heavy&&!isHeavy(s))return false;
  return true;
}
function sType(t){
  if(!t)return"Altro";
  if(t>=70&&t<=79)return"Cargo";
  if(t>=80&&t<=89)return"Tanker";
  if(t>=60&&t<=69)return"Passenger";
  if(t===35||t===36)return"Military";
  return"Altro";
}
function passSea(s){
  const t=sType(s.shipType||s.type||0);
  if(t==="Cargo"&&!seaF.cargo)return false;
  if(t==="Tanker"&&!seaF.tanker)return false;
  if(t==="Passenger"&&!seaF.passenger)return false;
  if(t==="Military"&&!seaF.military)return false;
  if(t==="Altro"&&!seaF.other)return false;
  return true;
}
function airDesc(cs,m){
  const c=(cs||"").trim().toUpperCase();
  for(const[k,v]of Object.entries(AIRLINE_DESC))if(c.startsWith(k))return v;
  return m?"Aeromobile militare identificato via ICAO24/callsign.":"Aeromobile civile in transito.";
}

// ══════════════════════════════════════════════════════════
// MAPPA
// ══════════════════════════════════════════════════════════
function initMap(){
  map=L.map("map",{
    center:[44,11],zoom:6,
    zoomControl:true,
    tap:true,           // touch iOS
    tapTolerance:15,
    touchZoom:true,
    bounceAtZoomLimits:false
  });

  // Tile ottimizzate per mobile (dimensione ridotta)
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
    attribution:"&copy; OpenStreetMap",
    maxZoom:13,minZoom:3,
    tileSize:256,keepBuffer:1
  }).addTo(map);

  trailLayer=L.layerGroup().addTo(map);
  cluster=L.markerClusterGroup({
    maxClusterRadius:60,    // più ampio su mobile (dita grandi)
    disableClusteringAtZoom:9,
    spiderfyOnMaxZoom:true,
    zoomToBoundsOnClick:true,
    polygonOptions:{color:"#00e5ff",weight:1,fillOpacity:.04}
  });
  map.addLayer(cluster);

  map.on("click",()=>{trailLayer.clearLayers();closeDetail();});
  setTimeout(()=>map.invalidateSize(),300);
  window.addEventListener("resize",()=>{ setTimeout(()=>map.invalidateSize(),100); });

  // Swipe down su sheet per chiuderlo
  initSheetSwipe();
  initDetailSwipe();
}

// ══════════════════════════════════════════════════════════
// SWIPE GESTURES
// ══════════════════════════════════════════════════════════
function initSheetSwipe(){
  const el=$("sheet");
  let startY=0,dragging=false;
  el.addEventListener("touchstart",e=>{startY=e.touches[0].clientY;dragging=true},{passive:true});
  el.addEventListener("touchmove",e=>{
    if(!dragging)return;
    const dy=e.touches[0].clientY-startY;
    if(dy>0) el.style.transform=`translateY(${dy}px)`;
  },{passive:true});
  el.addEventListener("touchend",e=>{
    dragging=false;
    const dy=e.changedTouches[0].clientY-startY;
    el.style.transform="";
    if(dy>60)closeSheet();
  },{passive:true});
}
function initDetailSwipe(){
  const el=$("detail");
  let startY=0,dragging=false;
  el.addEventListener("touchstart",e=>{startY=e.touches[0].clientY;dragging=true},{passive:true});
  el.addEventListener("touchmove",e=>{
    if(!dragging)return;
    const dy=e.touches[0].clientY-startY;
    if(dy>0) el.style.transform=`translateY(${dy}px)`;
  },{passive:true});
  el.addEventListener("touchend",e=>{
    dragging=false;
    const dy=e.changedTouches[0].clientY-startY;
    el.style.transform="";
    if(dy>80)closeDetail();
  },{passive:true});
}

// ══════════════════════════════════════════════════════════
// SHEET TOGGLE
// ══════════════════════════════════════════════════════════
function toggleSheet(){
  sheetOpen=!sheetOpen;
  $("sheet").classList.toggle("open",sheetOpen);
  $("nav-list").classList.toggle("list-on",sheetOpen);
}
function closeSheet(){
  sheetOpen=false;
  $("sheet").classList.remove("open");
  $("nav-list").classList.remove("list-on");
}

// ══════════════════════════════════════════════════════════
// TRAIETTORIA CIANO NEON
// ══════════════════════════════════════════════════════════
function drawTrail(lat,lon,track,speedMs){
  trailLayer.clearLayers();
  if(typeof lat!=="number"||typeof lon!=="number")return;
  const sp=typeof speedMs==="number"&&speedMs>0?speedMs:150;
  const steps=[5,10,20],R=6371000;
  const rd=d=>d*Math.PI/180,dr=r=>r*180/Math.PI;
  const pts=[[lat,lon]];
  steps.forEach(m=>{
    const d=sp*m*60/R,br=rd(track||0),la=rd(lat),lo=rd(lon);
    const la2=Math.asin(Math.sin(la)*Math.cos(d)+Math.cos(la)*Math.sin(d)*Math.cos(br));
    const lo2=lo+Math.atan2(Math.sin(br)*Math.sin(d)*Math.cos(la),Math.cos(d)-Math.sin(la)*Math.sin(la2));
    pts.push([dr(la2),dr(lo2)]);
  });
  L.polyline(pts,{color:"#00e5ff",weight:10,opacity:.12}).addTo(trailLayer);
  L.polyline(pts,{color:"#00e5ff",weight:4, opacity:.55}).addTo(trailLayer);
  L.polyline(pts,{color:"#ffffff",weight:2, opacity:.95,dashArray:"10 7"}).addTo(trailLayer);
  L.circleMarker(pts[pts.length-1],{radius:5,color:"#00e5ff",fillColor:"#00e5ff",fillOpacity:1,weight:2}).addTo(trailLayer);
  pts.slice(1).forEach((p,i)=>{
    L.marker(p,{icon:L.divIcon({
      className:"",
      html:`<div style="font-size:10px;font-weight:700;color:#00e5ff;text-shadow:0 0 8px #00e5ff,0 0 2px #000;white-space:nowrap;margin-left:8px">+${steps[i]}min</div>`,
      iconAnchor:[0,8]
    })}).addTo(trailLayer);
  });
}

function shipIcon(track,type){

        <path fill="${c}" stroke="#000" stroke-width=".6" d="M12 3L7 10H4L12 22L20 10H17Z"/>

// RENDER AEREI
// ══════════════════════════════════════════════════════════
function renderAir(){
  cluster.clearLayers();trailLayer.clearLayers();closeDetail();
  const batch=[];
  lastAir.forEach(s=>{
    if(!s||s.length<7)return;
    const la=s[6],lo=s[5];
    if(typeof la!=="number"||typeof lo!=="number")return;
    if(!passAir(s))return;
    const m=isMil(s);
    const mk=L.marker([la,lo],{icon:planeIcon(s[10],m)});
    mk.on("click",()=>{drawTrail(la,lo,s[10]||0,s[9]);openAirDetail(s)});
    batch.push(mk);
  });
  cluster.addLayers(batch);
  const v=lastAir.filter(s=>s&&s.length>=7&&typeof s[6]==="number"&&passAir(s));
  $("sb-count").textContent=v.length;
  $("sb-count").style.cssText="background:#ffd500;color:#000;font-size:11px;font-weight:700;padding:2px 9px;border-radius:99px";
  const el=$("sb-list");el.innerHTML="";
  if(!v.length){el.innerHTML=`<div class="empty">Nessun volo con questi filtri.</div>`;return}
  v.slice(0,150).forEach(s=>{
    const cs=(s[1]||"").trim()||"Senza callsign",g=s[8],m=isMil(s);
    const r=document.createElement("div");r.className="fr";
    r.innerHTML=`<span class="fr-ico">${m?"🪖":"✈"}</span>
      <div class="fr-info">
        <div class="fn-row"><span class="fn">${cs}</span>
          <span class="b ${g?"b-g":"b-f"}">${g?"GND":"FLY"}</span>
          ${m?`<span class="b b-m">MIL</span>`:""}</div>
        <div class="fs">${s[2]||"—"} · ${m2ft(s[7])} · ${ms2k(s[9])}</div>
      </div>`;
    r.onclick=()=>{
      map.setView([s[6],s[5]],10,{animate:true});
      drawTrail(s[6],s[5],s[10]||0,s[9]);
      openAirDetail(s);
    };
    el.appendChild(r);
  });
}

// RENDER NAVI
// ══════════════════════════════════════════════════════════
function renderSea(){
  cluster.clearLayers();trailLayer.clearLayers();closeDetail();
  const batch=[];
  lastSea.forEach(ship=>{
    if(typeof ship.lat!=="number"||typeof ship.lon!=="number")return;
    if(!passSea(ship))return;
    const t=sType(ship.shipType||ship.type||0);
    const mk=L.marker([ship.lat,ship.lon],{icon:shipIcon(ship.cog,t)});
    mk.on("click",()=>{
      drawTrail(ship.lat,ship.lon,ship.cog||0,(ship.sog||0)*.5144);

  });

  $("sb-count").style.cssText="background:#00b4d8;color:#000;font-size:11px;font-weight:700;padding:2px 9px;border-radius:99px";

async function fetchAir(){
  if(mode!=="air")return;
  const B=AIR_BBOX,st=$("status");
  try{
    st.textContent="Caricamento voli…";
    const res=await fetch(`${OPENSKY}?lamin=${B.lamin}&lomin=${B.lomin}&lamax=${B.lamax}&lomax=${B.lomax}`);
    if(res.status===429){st.textContent="⚠ Rate limit (riprovo tra 20s)";return}
    if(!res.ok)throw new Error("HTTP "+res.status);
    const d=await res.json();
    lastAir=Array.isArray(d.states)?d.states:[];
    renderAir();
    st.textContent=`✓ ${lastAir.length} voli · ${new Date().toLocaleTimeString()}`;
  }catch(e){st.textContent="✗ "+e.message;console.error(e)}
}

// ══════════════════════════════════════════════════════════
// FETCH NAVI — 3 tier + demo
// ══════════════════════════════════════════════════════════
async function fetchSea(){
  if(mode!=="sea")return;
  const B=SEA_BBOX,st=$("status");

  // TIER 1: Digitraffic
  try{
    st.textContent="Caricamento navi AIS…";
    const res=await fetch("https://meri.digitraffic.fi/api/v1/locations/latest",
      {signal:AbortSignal.timeout(7000)});
    if(res.ok){
      const d=await res.json();
      const feats=(d.features||[]).filter(f=>{
        const[lo,la]=f.geometry?.coordinates||[];
        return la>=B.lamin&&la<=B.lamax&&lo>=B.lomin&&lo<=B.lomax;
      });
      if(feats.length>0){
        lastSea=feats.map(f=>{
          const[lo,la]=f.geometry.coordinates,p=f.properties||{};
          return{mmsi:p.mmsi,name:p.name||("MMSI "+p.mmsi),
                 lat:la,lon:lo,sog:p.sog,cog:p.cog,
                 shipType:p.shipType||0,navStatus:p.navStat||"—",country:"—"};
        });
        renderSea();
        st.textContent=`✓ ${lastSea.length} navi · ${new Date().toLocaleTimeString()}`;
        return;
      }
    }
  }catch(e){console.warn("Digitraffic:",e.message)}

  // TIER 2: AISStream WebSocket
  if(AISSTREAM_KEY){
    try{
      st.textContent="Connessione AIS WebSocket…";
      const ships={};
      await new Promise((resolve,reject)=>{
        const ws=new WebSocket("wss://stream.aisstream.io/v0/stream");
        const t=setTimeout(()=>{ws.close();resolve()},8000);
        ws.onopen=()=>ws.send(JSON.stringify({
          APIKey:AISSTREAM_KEY,
          BoundingBoxes:[[[B.lamin,B.lomin],[B.lamax,B.lomax]]],
          FilterMessageTypes:["PositionReport","ShipStaticData"]
        }));
        ws.onmessage=ev=>{
          try{
            const msg=JSON.parse(ev.data),mmsi=msg?.MetaData?.MMSI;
            if(!mmsi)return;
            if(!ships[mmsi])ships[mmsi]={mmsi};
            if(msg.MessageType==="PositionReport"){
              const p=msg.Message.PositionReport;
              Object.assign(ships[mmsi],{lat:p.Latitude,lon:p.Longitude,sog:p.Sog,cog:p.Cog,navStatus:p.NavigationalStatus||"—"});
            }
            if(msg.MessageType==="ShipStaticData"){
              const p=msg.Message.ShipStaticData;
              ships[mmsi].name=(p.Name||"").trim();ships[mmsi].shipType=p.Type||0;
            }
            if(Object.keys(ships).length>=80){clearTimeout(t);ws.close();resolve()}
          }catch(_){}
        };
        ws.onerror=()=>{clearTimeout(t);reject()};
        ws.onclose=()=>{clearTimeout(t);resolve()};
      });
      const arr=Object.values(ships).filter(s=>typeof s.lat==="number");
      if(arr.length>0){
        lastSea=arr;renderSea();
        st.textContent=`✓ ${lastSea.length} navi (live) · ${new Date().toLocaleTimeString()}`;
        return;
      }
    }catch(e){console.warn("AISStream:",e.message)}
  }

  // TIER 3: Demo
  st.textContent="⚠ Demo — API AIS non disponibili";
  lastSea=[
    {mmsi:"247100001",name:"MSC ROMA",        lat:43.82,lon:7.77, sog:16,cog:105,shipType:71,navStatus:"In rotta",country:"Italy"},
    {mmsi:"247100002",name:"COSTA SMERALDA",  lat:43.50,lon:9.10, sog:18,cog:210,shipType:60,navStatus:"In rotta",country:"Italy"},
    {mmsi:"247100003",name:"GRIMALDI LINES",  lat:44.10,lon:8.35, sog:14,cog:185,shipType:70,navStatus:"In rotta",country:"Italy"},
    {mmsi:"247100004",name:"TIRRENIA E.",     lat:42.10,lon:11.50,sog:15,cog:315,shipType:60,navStatus:"In rotta",country:"Italy"},
    {mmsi:"247100005",name:"ENI TANKER 1",    lat:43.20,lon:13.20,sog:10,cog:270,shipType:80,navStatus:"In rotta",country:"Italy"},
    {mmsi:"636015001",name:"MAERSK TARANTO",  lat:40.42,lon:17.22,sog:0, cog:0,  shipType:70,navStatus:"In porto",country:"Denmark"},
    {mmsi:"248100001",name:"VENEZIA CARGO",   lat:45.35,lon:12.35,sog:5, cog:90, shipType:70,navStatus:"In porto",country:"Italy"},
    {mmsi:"247900001",name:"G.COSTIERA CP",   lat:44.40,lon:8.92, sog:22,cog:45, shipType:35,navStatus:"Servizio",country:"Italy"},
    {mmsi:"247100008",name:"BULK SICILIA",    lat:38.10,lon:15.60,sog:8, cog:330,shipType:70,navStatus:"In rotta",country:"Italy"},
    {mmsi:"247100009",name:"ADRIATIC FERRY",  lat:41.63,lon:16.50,sog:20,cog:120,shipType:60,navStatus:"In rotta",country:"Italy"},
    {mmsi:"229100001",name:"MSC GENOVA",      lat:44.25,lon:8.55, sog:12,cog:160,shipType:71,navStatus:"In rotta",country:"Malta"},
    {mmsi:"247100011",name:"LIVORNO PORT",    lat:43.55,lon:10.30,sog:0, cog:0,  shipType:70,navStatus:"In porto",country:"Italy"},
    {mmsi:"247100012",name:"GNV AZZURRA",     lat:43.10,lon:9.50, sog:17,cog:190,shipType:60,navStatus:"In rotta",country:"Italy"},

// ══════════════════════════════════════════════════════════
// VENTO — griglia 10×8, formato corretto leaflet-velocity
// ══════════════════════════════════════════════════════════
async function fetchAndShowWind(){
  const st=$("status");
  try{
    if(windLayer){map.removeLayer(windLayer);windLayer=null}
    st.textContent="💨 Caricamento vento…";
    const nx=10,ny=8;
    const lo1=5.0,lo2=18.0,la1=48.0,la2=37.0;
    const dx=(lo2-lo1)/(nx-1),dy=(la1-la2)/(ny-1);
    const lats=[],lons=[];
    for(let j=0;j<ny;j++)for(let i=0;i<nx;i++){
      lats.push((la1-j*dy).toFixed(2));
      lons.push((lo1+i*dx).toFixed(2));
    }
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lats.join(",")}&longitude=${lons.join(",")}&hourly=wind_speed_10m,wind_direction_10m&forecast_days=1&timezone=UTC&timeformat=unixtime`;
    const res=await fetch(url);
    if(!res.ok)throw new Error("Open-Meteo HTTP "+res.status);
    const raw=await res.json();
    const results=Array.isArray(raw)?raw:[raw];
    const now=Math.floor(Date.now()/1000);
    const uArr=[],vArr=[];
    results.forEach(loc=>{
      const times=loc.hourly?.time||[];
      let idx=times.findIndex(t=>t>=now);
      if(idx<0)idx=0;
      const spd=(loc.hourly?.wind_speed_10m?.[idx]||0)/3.6;
      const dir=(loc.hourly?.wind_direction_10m?.[idx]||0);
      const rad=dir*Math.PI/180;
      uArr.push(-(spd*Math.sin(rad)));
      vArr.push(-(spd*Math.cos(rad)));
    });
    while(uArr.length<nx*ny){uArr.push(0);vArr.push(0)}
    const header={
      parameterCategory:2,nx,ny,
      lo1,lo2,la1,la2,dx,dy,
      refTime:new Date().toISOString()
    };
    windLayer=L.velocityLayer({
      displayValues:true,
      displayOptions:{
        velocityType:"Vento",
        displayPosition:"bottomleft",
        displayEmptyString:"Nessun dato",
        angleConvention:"bearingCW",
        speedUnit:"k/h"
      },
      data:[
        {header:{...header,parameterNumber:2,parameterNumberName:"eastward_wind"},  data:uArr},
        {header:{...header,parameterNumber:3,parameterNumberName:"northward_wind"}, data:vArr}
      ],
      maxVelocity:20,minVelocity:0,
      velocityScale:0.006,
      colorScale:["#e0f7ff","#7ecfff","#00aaff","#0066ff","#a855f7","#e040fb"],
      opacity:0.92,
      particleAge:90,
      particleMultiplier:1/200
    });
    map.addLayer(windLayer);
    const avgMs=Math.sqrt(uArr.reduce((a,b)=>a+b*b,0)/uArr.length);
    st.textContent=`💨 Vento ~${(avgMs*3.6).toFixed(0)} km/h · ${new Date().toLocaleTimeString()}`;
  }catch(e){
    console.error("Wind:",e);
    st.textContent="✗ Errore vento";
    $("nav-wind").classList.remove("wind-on");
    windOn=false;
  }
}

function toggleWind(){
  windOn=!windOn;
  $("nav-wind").classList.toggle("wind-on",windOn);
  if(windOn)fetchAndShowWind();
  else{if(windLayer){map.removeLayer(windLayer);windLayer=null}$("status").textContent="💨 Vento disattivato"}
}

function tsf(btn){
  const k=btn.dataset.k;seaF[k]=!seaF[k];
  btn.className="fb"+(seaF[k]?(k==="military"?" on-mil":" on-sea"):"");
  renderSea();
}

function setMode(m){
  mode=m;
  ["air","sea"].forEach(n=>{
    $("nav-"+n).className="nav-btn"+(m===n?" "+n+"-on":"");
  });
  cluster.clearLayers();trailLayer.clearLayers();closeDetail();closeSheet();
  clearInterval(airTimer);clearInterval(seaTimer);
  buildFilters();
  if(m==="air"){
    map.setView([45.07,7.68],7,{animate:true});
    fetchAir();airTimer=setInterval(fetchAir,20000);
  }else{
    map.setView([42,12],6,{animate:true});
    fetchSea();seaTimer=setInterval(fetchSea,30000);
  }
}
