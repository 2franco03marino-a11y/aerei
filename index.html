<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>FlyRadar + MarineRadar Italia</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-velocity@2.1.0/dist/leaflet-velocity.css"/>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:system-ui,sans-serif; background:#0a0a0f; color:#eee; width:100vw; height:100vh; overflow:hidden; }

#header {
  position:fixed; top:0; left:0; right:0; height:46px;
  background:#0d0d18; border-bottom:1px solid #1a1a30;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 12px; z-index:3000; gap:8px;
}
.title { font-size:13px; font-weight:800; white-space:nowrap; }
#status { font-size:10px; color:#444; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:260px; flex:1; text-align:center; }
#mode-buttons { display:flex; gap:5px; flex-shrink:0; }
.mode-btn {
  font-size:11px; font-weight:700; padding:4px 11px; border-radius:99px;
  border:1px solid #222; background:#111; color:#555;
  cursor:pointer; transition:all .2s; white-space:nowrap; outline:none;
}
.mode-btn.air-on  { background:#ffd500; color:#000; border-color:#ffd500; }
.mode-btn.sea-on  { background:#00b4d8; color:#000; border-color:#00b4d8; }
.mode-btn.wind-on { background:#7c4dff; color:#fff; border-color:#7c4dff; }

#map { position:fixed; top:46px; left:0; right:0; bottom:0; z-index:1; }

/* DETAIL PANEL */
#detail {
  position:fixed; top:56px; left:10px; width:278px;
  background:rgba(10,10,20,.97); border:1px solid #1a1a30;
  border-radius:12px; z-index:2500; display:none; flex-direction:column;
  overflow:hidden; max-height:calc(100vh - 66px);
  box-shadow:0 8px 40px rgba(0,0,0,.9);
}
#detail.show { display:flex; }
#det-close {
  position:absolute; top:7px; right:9px; cursor:pointer;
  font-size:13px; color:#555; z-index:5;
  background:rgba(0,0,0,.6); border-radius:50%;
  width:22px; height:22px; display:flex; align-items:center; justify-content:center;
}
#det-close:hover { color:#fff; }
#det-img {
  width:100%; height:152px; background:#060610;
  position:relative; overflow:hidden; flex-shrink:0;
}
#det-img img { width:100%; height:100%; object-fit:cover; display:block; }
.ph {
  width:100%; height:100%; display:flex; flex-direction:column;
  align-items:center; justify-content:center; color:#333; font-size:11px; gap:5px;
}
.ph .ico { font-size:36px; }
#det-body { padding:11px 13px; overflow-y:auto; flex:1; }
#det-cs { font-size:17px; font-weight:800; margin-bottom:2px; }
#det-id { font-size:10px; color:#444; margin-bottom:7px; }
#det-tags { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:9px; }
.tag { font-size:10px; font-weight:700; padding:2px 8px; border-radius:99px; text-transform:uppercase; }
.t-fly { background:rgba(0,200,80,.1); color:#00c850; }
.t-gnd { background:rgba(255,80,80,.1); color:#ff5050; }
.t-mil { background:rgba(76,175,80,.15); color:#4caf50; }
.t-civ { background:rgba(100,160,255,.1); color:#64a0ff; }
.t-sea { background:rgba(0,180,216,.12); color:#00b4d8; }
#det-desc { font-size:11px; color:#555; line-height:1.6; margin-bottom:9px; font-style:italic; border-left:2px solid #181828; padding-left:7px; }
#det-tbl { width:100%; border-collapse:collapse; font-size:11px; }
#det-tbl td:first-child { color:#444; padding:3px 10px 3px 0; width:82px; }
#det-tbl td:last-child { color:#ddd; font-weight:600; }
#det-tbl tr { border-bottom:1px solid #111; }
#det-tbl tr:last-child { border-bottom:none; }
#det-credit { font-size:9px; color:#252525; margin-top:9px; text-align:right; }

/* SIDEBAR */
#sidebar {
  position:fixed; top:56px; right:10px; width:252px;
  max-height:calc(100vh - 66px); background:rgba(10,10,20,.97);
  border:1px solid #1a1a30; border-radius:12px;
  display:flex; flex-direction:column; overflow:hidden;
  z-index:2000; box-shadow:0 8px 40px rgba(0,0,0,.9);
}
#sb-head {
  padding:9px 12px; background:#0d0d1a; border-bottom:1px solid #161626;
  display:flex; justify-content:space-between; align-items:center;
  font-size:12px; font-weight:700; flex-shrink:0;
}
#sb-count {
  font-size:11px; font-weight:700; padding:2px 8px; border-radius:99px;
  background:#ffd500; color:#000;
}
#filters { padding:8px 10px; border-bottom:1px solid #161626; background:#0a0a18; flex-shrink:0; }
.ft { font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:#444; margin-bottom:5px; }
.fg { display:flex; flex-wrap:wrap; gap:4px; }
.fb {
  font-size:10px; font-weight:600; padding:3px 9px; border-radius:99px;
  border:1px solid #1a1a2e; background:#0e0e1a; color:#555;
  cursor:pointer; transition:all .15s; user-select:none;
}
.fb.on      { background:#ffd500; color:#000; border-color:#ffd500; }
.fb.on-mil  { background:#4caf50; color:#000; border-color:#4caf50; }
.fb.on-gnd  { background:#ff5555; color:#fff; border-color:#ff5555; }
.fb.on-sea  { background:#00b4d8; color:#000; border-color:#00b4d8; }

#sb-list { overflow-y:auto; flex:1; padding:4px 8px; }
.fr { padding:5px 3px; border-bottom:1px solid #111; cursor:pointer; border-radius:4px; }
.fr:hover { background:rgba(255,255,255,.03); }
.fr:last-child { border-bottom:none; }
.fn { font-size:12px; font-weight:700; display:flex; align-items:center; gap:3px; flex-wrap:wrap; }
.fs { font-size:10px; color:#444; margin-top:1px; }
.b { font-size:9px; padding:1px 5px; border-radius:99px; font-weight:700; text-transform:uppercase; }
.b-f { background:rgba(0,200,80,.1);  color:#00c850; }
.b-g { background:rgba(255,80,80,.1); color:#ff5050; }
.b-m { background:rgba(76,175,80,.12); color:#4caf50; }
.b-s { background:rgba(0,180,216,.12); color:#00b4d8; }
.empty { font-size:11px; color:#333; padding:10px 4px; }

/* CLUSTER */
.marker-cluster-small  { background:rgba(255,213,0,.3); }
.marker-cluster-small div  { background:rgba(255,213,0,.9); color:#000; font-weight:700; }
.marker-cluster-medium { background:rgba(255,170,0,.3); }
.marker-cluster-medium div { background:rgba(255,170,0,.9); color:#000; font-weight:700; }
.marker-cluster-large  { background:rgba(255,100,0,.3); }
.marker-cluster-large div  { background:rgba(255,100,0,.9); color:#000; font-weight:700; }

.leaflet-popup-content-wrapper { background:#12121f!important; color:#eee!important; border:1px solid #1a1a2e!important; border-radius:10px!important; box-shadow:0 4px 24px rgba(0,0,0,.9)!important; }
.leaflet-popup-content { margin:0!important; }
.leaflet-popup-tip { background:#12121f!important; }
.leaflet-popup-close-button { color:#555!important; }
</style>
</head>
<body>

<div id="header">
  <span class="title">✈ FlyRadar + ⛵ MarineRadar</span>
  <span id="status">Avvio…</span>
  <div id="mode-buttons">
    <button class="mode-btn air-on" id="btn-air"  onclick="setMode('air')">✈ Aerei</button>
    <button class="mode-btn"        id="btn-sea"  onclick="setMode('sea')">⛵ Navi</button>
    <button class="mode-btn"        id="btn-wind" onclick="toggleWind()">💨 Vento</button>
  </div>
</div>

<div id="map"></div>

<div id="detail">
  <div id="det-close" onclick="closeDetail()">✕</div>
  <div id="det-img"><div class="ph"><span class="ico">✈</span><span>Caricamento…</span></div></div>
  <div id="det-body">
    <div id="det-cs">—</div>
    <div id="det-id">—</div>
    <div id="det-tags"></div>
    <div id="det-desc"></div>
    <table id="det-tbl">
      <tr><td>Paese</td><td id="d-c">—</td></tr>
      <tr id="row-alt"><td>Quota</td><td id="d-a">—</td></tr>
      <tr><td>Velocità</td><td id="d-s">—</td></tr>
      <tr><td>Prua</td><td id="d-h">—</td></tr>
      <tr><td>Posizione</td><td id="d-p">—</td></tr>
      <tr><td>Stato</td><td id="d-g">—</td></tr>
    </table>
    <div id="det-credit">Foto: Planespotters.net · Dati: OpenSky / AIS</div>
  </div>
</div>

<div id="sidebar">
  <div id="sb-head">
    <span id="sb-title">Voli area locale</span>
    <span id="sb-count">0</span>
  </div>
  <div id="filters">
    <div class="ft">Filtri</div>
    <div class="fg" id="fg"></div>
  </div>
  <div id="sb-list"><div class="empty">Caricamento…</div></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet-velocity@2.1.0/dist/leaflet-velocity.js"></script>

<script>
// ══════════════════════════════════════════════════
// COSTANTI
// ══════════════════════════════════════════════════
const OPENSKY = "https://opensky-network.org/api/states/all";
const AIR_BBOX = { lamin:43.5, lamax:48.5, lomin:5.0,  lomax:13.5 };
const SEA_BBOX = { lamin:36.0, lamax:48.0, lomin:4.0,  lomax:20.0 };

// API navi senza key (Marinesia proxy)
const MARINESIA_URL = "https://meri.digitraffic.fi/api/v1/locations/latest";
// fallback: OpenSeaMap non ha API REST dati live, usiamo Digitraffic (Finlandia → Baltico + Mediterraneo)
const DIGITRAFFIC_URL = "https://meri.digitraffic.fi/api/v1/locations/latest";

const MIL_PREFIXES  = ["ae","a1","a2","a3","a4","a5","43c","43d","43e","43f","3b7","3b8","3b9","3ba","3bb","43b","43a","4240","4241","4242","4243","4244","4245","300","301","302","500","501"];
const MIL_CALLSIGNS = ["RCH","DUKE","REACH","JAKE","FURY","VIPER","GHOST","EAGLE","VENUS","MARS","ATLAS","MAGMA","TOPGUN","KNIFE","IRON","STEEL","AMI","IAM","GAF","RAF","USAF","NAVY"];
const AIRLINE_DESC  = {
  "RYR":"Ryanair — low-cost irlandese, tra le più grandi d'Europa.",
  "EZY":"easyJet — low-cost britannica, molto attiva in Italia.",
  "AZA":"ITA Airways — compagnia di bandiera italiana.",
  "BAW":"British Airways — compagnia di bandiera UK.",
  "DLH":"Lufthansa — compagnia di bandiera tedesca.",
  "AFR":"Air France — compagnia di bandiera francese.",
  "UAE":"Emirates — compagnia degli Emirati Arabi.",
  "SWR":"Swiss International Air Lines — Svizzera.",
  "VOL":"Volotea — low-cost spagnola, molte rotte italiane.",
  "WZZ":"Wizz Air — low-cost ungherese.",
  "VLG":"Vueling — low-cost spagnola gruppo IAG.",
  "AMI":"Aeronautica Militare Italiana.",
  "RCH":"US Air Force — volo militare americano.",
  "GAF":"German Air Force — militare tedesco.",
  "RAF":"Royal Air Force — militare britannico.",
};

// ══════════════════════════════════════════════════
// STATO
// ══════════════════════════════════════════════════
let map, cluster, trailLayer, windLayer;
let lastAir = [], lastSea = [];
let mode = "air", windOn = false;
let airTimer = null;

const airFilters = { civil:true, mil:true, fly:true, gnd:false, heavy:false };
const seaFilters = { cargo:true, tanker:true, passenger:true, military:true, other:true };

// ══════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════
const ms2kmh  = v => typeof v==="number" ? (v*3.6).toFixed(0)+" km/h" : "—";
const m2ft    = v => typeof v==="number" ? (v*3.28084).toFixed(0)+" ft" : "—";
const kn2kmh  = v => typeof v==="number" ? (v*1.852).toFixed(0)+" km/h" : "—";
const setEl   = (id,v) => document.getElementById(id).textContent = v;

function isMil(s){
  const ic=(s[0]||"").toLowerCase(), cs=(s[1]||"").trim().toUpperCase();
  return MIL_PREFIXES.some(p=>ic.startsWith(p)) || MIL_CALLSIGNS.some(p=>cs.startsWith(p));
}
function isHeavy(s){
  const c=s.length>=18?s[17]:null;
  if(typeof c==="number") return c===5||c===6;
  return typeof s[7]==="number"&&s[7]>9000&&typeof s[9]==="number"&&s[9]>220;
}
function passAir(s){
  const m=isMil(s),g=s[8];
  if(!airFilters.civil&&!m)  return false;
  if(!airFilters.mil  && m)  return false;
  if(!airFilters.fly  &&!g)  return false;
  if(!airFilters.gnd  && g)  return false;
  if( airFilters.heavy&&!isHeavy(s)) return false;
  return true;
}
function shipType(t){
  if(!t) return "Altro";
  if(t>=70&&t<=79) return "Cargo";
  if(t>=80&&t<=89) return "Tanker";
  if(t>=60&&t<=69) return "Passenger";
  if(t===35||t===36) return "Military";
  return "Altro";
}
function passSea(s){
  const t=shipType(s.shipType||s.type);
  if(t==="Cargo"     &&!seaFilters.cargo)     return false;
  if(t==="Tanker"    &&!seaFilters.tanker)    return false;
  if(t==="Passenger" &&!seaFilters.passenger) return false;
  if(t==="Military"  &&!seaFilters.military)  return false;
  if(t==="Altro"     &&!seaFilters.other)     return false;
  return true;
}
function getAirDesc(cs,m){
  if(!cs) return null;
  const c=cs.trim().toUpperCase();
  for(const[k,v] of Object.entries(AIRLINE_DESC)) if(c.startsWith(k)) return v;
  return m ? "Aeromobile militare identificato via ICAO24/callsign." : "Aeromobile civile in transito.";
}

// ══════════════════════════════════════════════════
// MAPPA
// ══════════════════════════════════════════════════
function initMap(){
  map = L.map("map",{center:[44,11],zoom:6,zoomControl:true});
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
    attribution:"&copy; OpenStreetMap", maxZoom:13, minZoom:3
  }).addTo(map);

  trailLayer = L.layerGroup().addTo(map);

  cluster = L.markerClusterGroup({
    maxClusterRadius:50, disableClusteringAtZoom:9,
    spiderfyOnMaxZoom:true, zoomToBoundsOnClick:true,
    polygonOptions:{color:"#00e5ff",weight:1,fillOpacity:.04}
  });
  map.addLayer(cluster);

  map.on("click",()=>{ trailLayer.clearLayers(); closeDetail(); });
  setTimeout(()=>map.invalidateSize(),200);
  window.addEventListener("resize",()=>map.invalidateSize());
}

// ══════════════════════════════════════════════════
// TRAIETTORIA CIANO NEON
// ══════════════════════════════════════════════════
function drawTrail(lat, lon, track, speedMs){
  trailLayer.clearLayers();
  if(typeof lat!=="number"||typeof lon!=="number") return;
  const sp=typeof speedMs==="number"&&speedMs>0 ? speedMs : 150;
  const steps=[5,10,20];
  const R=6371000, rd=d=>d*Math.PI/180, dr=r=>r*180/Math.PI;
  const pts=[[lat,lon]];
  steps.forEach(m=>{
    const d=sp*m*60/R, br=rd(track||0), la=rd(lat), lo=rd(lon);
    const la2=Math.asin(Math.sin(la)*Math.cos(d)+Math.cos(la)*Math.sin(d)*Math.cos(br));
    const lo2=lo+Math.atan2(Math.sin(br)*Math.sin(d)*Math.cos(la),Math.cos(d)-Math.sin(la)*Math.sin(la2));
    pts.push([dr(la2),dr(lo2)]);
  });

  // Glow esterno (largho, semitrasparente)
  L.polyline(pts,{color:"#00e5ff",weight:9,opacity:.15}).addTo(trailLayer);
  // Bordo intermedio
  L.polyline(pts,{color:"#00e5ff",weight:4,opacity:.5}).addTo(trailLayer);
  // Linea principale tratteggiata
  L.polyline(pts,{color:"#ffffff",weight:2,opacity:.95,dashArray:"10 7"}).addTo(trailLayer);

  L.circleMarker(pts[pts.length-1],{radius:5,color:"#00e5ff",fillColor:"#00e5ff",fillOpacity:1,weight:2}).addTo(trailLayer);
  pts.slice(1).forEach((p,i)=>{
    L.marker(p,{icon:L.divIcon({
      className:"",
      html:`<div style="font-size:10px;font-weight:700;color:#00e5ff;text-shadow:0 0 8px #00e5ff,0 0 2px #000;white-space:nowrap;margin-left:8px;">+${steps[i]}min</div>`,
      iconAnchor:[0,8]
    })}).addTo(trailLayer);
  });
}

// ══════════════════════════════════════════════════
// ICONE
// ══════════════════════════════════════════════════
function planeIcon(track, mil){
  const r=typeof track==="number"?track:0, c=mil?"#4caf50":"#ffd500";
  return L.divIcon({ className:"", iconSize:[22,22], iconAnchor:[11,11],
    html:`<div style="width:22px;height:22px;transform:rotate(${r}deg);transform-origin:center;">
      <svg viewBox="0 0 24 24" width="22" height="22">
        <path fill="${c}" stroke="#000" stroke-width=".5"
          d="M12 2c-.4 0-.77.24-.92.62L9.2 8.5 4 10.5v1l4.5-.5L11 15l-2.5 2-2 .5v1l3-.3L12 17l2.5 1.2 3 .3v-1l-2-.5L13 15l2.5-4.5L20 11.5v-1L14.8 8.5 12.92 2.62A1 1 0 0 0 12 2z"/>
      </svg></div>`
  });
}

function shipIcon(track, type){
  const r=typeof track==="number"?track:0;
  const c = type==="Military"?"#4caf50" : type==="Tanker"?"#ff9800" : type==="Passenger"?"#e040fb" : "#00b4d8";
  return L.divIcon({ className:"", iconSize:[20,20], iconAnchor:[10,10],
    html:`<div style="width:20px;height:20px;transform:rotate(${r}deg);transform-origin:center;">
      <svg viewBox="0 0 24 24" width="20" height="20">
        <path fill="${c}" stroke="#000" stroke-width=".6"
          d="M12 3 L7 10 H4 L12 22 L20 10 H17 Z"/>
      </svg></div>`
  });
}

// ══════════════════════════════════════════════════
// DETAIL PANEL
// ══════════════════════════════════════════════════
function showDetail(){  document.getElementById("detail").classList.add("show"); }
function closeDetail(){ document.getElementById("detail").classList.remove("show"); }

function loadAirPhoto(icao){
  const w=document.getElementById("det-img");
  w.innerHTML=`<div class="ph"><span class="ico">✈</span><span>Caricamento foto…</span></div>`;
  fetch(`https://api.planespotters.net/pub/photos/hex/${icao.toLowerCase()}`)
    .then(r=>r.json()).then(d=>{
      const ph=d.photos;
      if(ph&&ph.length>0){
        const src=ph[0].thumbnail_large?.src||ph[0].thumbnail?.src;
        if(src){
          const cr=ph[0].photographer||"";
          w.innerHTML=`<img src="${src}" onerror="this.parentElement.innerHTML='<div class=ph><span class=ico>✈</span><span>Nessuna foto</span></div>'"/>
            ${cr?`<div style="position:absolute;bottom:4px;right:6px;font-size:9px;color:rgba(255,255,255,.4);background:rgba(0,0,0,.5);padding:1px 5px;border-radius:4px;">📷 ${cr}</div>`:""}`;
          return;
        }
      }
      w.innerHTML=`<div class="ph"><span class="ico">✈</span><span>Nessuna foto</span></div>`;
    }).catch(()=>{ w.innerHTML=`<div class="ph"><span class="ico">✈</span><span>Foto non disponibile</span></div>`; });
}

function loadShipPhoto(mmsi){
  const w=document.getElementById("det-img");
  w.innerHTML=`<div class="ph"><span class="ico">⛵</span><span>Caricamento foto…</span></div>`;
  const url=`https://photos.marinetraffic.com/ais/showphoto.aspx?mmsi=${mmsi}&size=thumb300`;
  const img=new Image();
  img.onload=()=>{ w.innerHTML=`<img src="${url}" style="width:100%;height:100%;object-fit:cover;"/>`; };
  img.onerror=()=>{ w.innerHTML=`<div class="ph"><span class="ico">⛵</span><span>Nessuna foto disponibile</span></div>`; };
  img.src=url;
}

function openAirDetail(s){
  const m=isMil(s), g=s[8];
  const cs=(s[1]||"").trim()||"Senza callsign";
  setEl("det-cs", cs);
  setEl("det-id", "ICAO24: "+(s[0]||"").toUpperCase());
  setEl("d-c", s[2]||"—");
  setEl("d-a", m2ft(s[7]));
  setEl("d-s", ms2kmh(s[9]));
  setEl("d-h", typeof s[10]==="number"?s[10].toFixed(0)+"°":"—");
  setEl("d-p", (typeof s[6]==="number"&&typeof s[5]==="number")?s[6].toFixed(3)+", "+s[5].toFixed(3):"—");
  setEl("d-g", g?"🔴 A terra":"🟢 In volo");
  document.getElementById("row-alt").style.display="";
  document.getElementById("det-tags").innerHTML=`
    <span class="tag ${g?"t-gnd":"t-fly"}">${g?"A terra":"In volo"}</span>
    <span class="tag ${m?"t-mil":"t-civ"}">${m?"Militare":"Civile"}</span>`;
  const desc=getAirDesc(cs,m)||"";
  const de=document.getElementById("det-desc");
  de.textContent=desc; de.style.display=desc?"block":"none";
  document.getElementById("det-credit").textContent="Foto: Planespotters.net · Dati: OpenSky Network";
  loadAirPhoto(s[0]||"");
  showDetail();
}

function openSeaDetail(ship){
  const t=shipType(ship.shipType||ship.type);
  setEl("det-cs", ship.name||("MMSI: "+ship.mmsi));
  setEl("det-id", "MMSI: "+(ship.mmsi||"—"));
  setEl("d-c", ship.country||"—");
  setEl("d-a", "—");
  setEl("d-s", kn2kmh(ship.sog));
  setEl("d-h", typeof ship.cog==="number"?ship.cog.toFixed(0)+"°":"—");
  setEl("d-p", (typeof ship.lat==="number"&&typeof ship.lon==="number")?ship.lat.toFixed(3)+", "+ship.lon.toFixed(3):"—");
  setEl("d-g", ship.navStatus||"In navigazione");
  document.getElementById("row-alt").style.display="none";
  document.getElementById("det-tags").innerHTML=`<span class="tag t-sea">${t}</span><span class="tag t-sea">⛵ Nave</span>`;
  const de=document.getElementById("det-desc");
  de.textContent=`${t} — rilevato via AIS (Automatic Identification System).`; de.style.display="block";
  document.getElementById("det-credit").textContent="Foto: MarineTraffic · Dati: AIS Digitraffic";
  loadShipPhoto(ship.mmsi);
  showDetail();
}

// ══════════════════════════════════════════════════
// RENDER AEREI
// ══════════════════════════════════════════════════
function renderAir(){
  cluster.clearLayers(); trailLayer.clearLayers(); closeDetail();
  const batch=[];
  lastAir.forEach(s=>{
    if(!s||s.length<7) return;
    const la=s[6],lo=s[5];
    if(typeof la!=="number"||typeof lo!=="number") return;
    if(!passAir(s)) return;
    const m=isMil(s);
    const mk=L.marker([la,lo],{icon:planeIcon(s[10],m)});
    mk.on("click",()=>{ drawTrail(la,lo,s[10]||0,s[9]); openAirDetail(s); });
    batch.push(mk);
  });
  cluster.addLayers(batch);
  const v=lastAir.filter(s=>s&&s.length>=7&&typeof s[6]==="number"&&typeof s[5]==="number"&&passAir(s));
  document.getElementById("sb-count").textContent=v.length;
  document.getElementById("sb-count").style.cssText="background:#ffd500;color:#000;";
  const el=document.getElementById("sb-list"); el.innerHTML="";
  if(!v.length){ el.innerHTML=`<div class="empty">Nessun volo con questi filtri.</div>`; return; }
  v.slice(0,150).forEach(s=>{
    const cs=(s[1]||"").trim()||"Senza callsign", g=s[8], m=isMil(s);
    const r=document.createElement("div"); r.className="fr";
    r.innerHTML=`<div class="fn">${cs}<span class="b ${g?"b-g":"b-f"}">${g?"GND":"FLY"}</span>${m?`<span class="b b-m">MIL</span>`:""}</div>
      <div class="fs">${s[2]||"—"} · ${m2ft(s[7])} · ${ms2kmh(s[9])}</div>`;
    r.onclick=()=>{ map.setView([s[6],s[5]],10,{animate:true}); drawTrail(s[6],s[5],s[10]||0,s[9]); openAirDetail(s); };
    el.appendChild(r);
  });
}

// ══════════════════════════════════════════════════
// RENDER NAVI
// ══════════════════════════════════════════════════
function renderSea(){
  cluster.clearLayers(); trailLayer.clearLayers(); closeDetail();
  const batch=[];
  lastSea.forEach(ship=>{
    if(typeof ship.lat!=="number"||typeof ship.lon!=="number") return;
    if(!passSea(ship)) return;
    const t=shipType(ship.shipType||ship.type);
    const mk=L.marker([ship.lat,ship.lon],{icon:shipIcon(ship.cog,t)});
    mk.on("click",()=>{
      const sogMs=typeof ship.sog==="number"?ship.sog*.5144:100;
      drawTrail(ship.lat,ship.lon,ship.cog||0,sogMs);
      openSeaDetail(ship);
    });
    batch.push(mk);
  });
  cluster.addLayers(batch);
  const v=lastSea.filter(s=>typeof s.lat==="number"&&typeof s.lon==="number"&&passSea(s));
  document.getElementById("sb-count").textContent=v.length;
  document.getElementById("sb-count").style.cssText="background:#00b4d8;color:#000;";
  const el=document.getElementById("sb-list"); el.innerHTML="";
  if(!v.length){ el.innerHTML=`<div class="empty">Nessuna nave con questi filtri.<br><span style="color:#333">Caricamento AIS in corso…</span></div>`; return; }
  v.slice(0,150).forEach(ship=>{
    const t=shipType(ship.shipType||ship.type);
    const r=document.createElement("div"); r.className="fr";
    r.innerHTML=`<div class="fn">${ship.name||ship.mmsi||"—"}<span class="b b-s">${t}</span></div>
      <div class="fs">${ship.country||"—"} · ${kn2kmh(ship.sog)}</div>`;
    r.onclick=()=>{
      map.setView([ship.lat,ship.lon],10,{animate:true});
      const sogMs=typeof ship.sog==="number"?ship.sog*.5144:100;
      drawTrail(ship.lat,ship.lon,ship.cog||0,sogMs); openSeaDetail(ship);
    };
    el.appendChild(r);
  });
}

// ══════════════════════════════════════════════════
// FETCH AEREI
// ══════════════════════════════════════════════════
async function fetchAir(){
  if(mode!=="air") return;
  const B=AIR_BBOX;
  const url=`${OPENSKY}?lamin=${B.lamin}&lomin=${B.lomin}&lamax=${B.lamax}&lomax=${B.lomax}`;
  const st=document.getElementById("status");
  try{
    st.textContent="Caricamento voli…";
    const r=await fetch(url);
    if(r.status===429){ st.textContent="⚠ Rate limit API (riprovo tra 20s)"; return; }
    if(!r.ok) throw new Error("HTTP "+r.status);
    const d=await r.json();
    lastAir=Array.isArray(d.states)?d.states:[];
    renderAir();
    st.textContent=`✓ ${lastAir.length} voli · ${new Date().toLocaleTimeString()}`;
  }catch(e){ st.textContent="✗ "+e.message; console.error(e); }
}

// ══════════════════════════════════════════════════
// FETCH NAVI — Digitraffic.fi (no API key, globale)
// ══════════════════════════════════════════════════
async function fetchSea(){
  if(mode!=="sea") return;
  const st=document.getElementById("status");
  try{
    st.textContent="Caricamento navi AIS…";

    // Digitraffic restituisce tutte le posizioni recenti
    const r=await fetch(DIGITRAFFIC_URL);
    if(!r.ok) throw new Error("HTTP "+r.status);
    const d=await r.json();

    // Formato Digitraffic: { type:"FeatureCollection", features:[ { geometry:{ coordinates:[lon,lat] }, properties:{ mmsi, sog, cog, ... } } ] }
    const feats=d.features||[];
    const B=SEA_BBOX;

    lastSea=feats
      .filter(f=>{
        const [lo,la]=f.geometry?.coordinates||[];
        return typeof la==="number"&&typeof lo==="number"&&
               la>=B.lamin&&la<=B.lamax&&lo>=B.lomin&&lo<=B.lomax;
      })
      .map(f=>{
        const [lo,la]=f.geometry.coordinates;
        const p=f.properties||{};
        return {
          mmsi:    p.mmsi,
          name:    p.name||("MMSI "+p.mmsi),
          lat:     la,
          lon:     lo,
          sog:     p.sog,          // nodi
          cog:     p.cog,          // gradi
          shipType:p.shipType||0,
          navStatus:p.navStat||"—",
          country: p.destination||"—"
        };
      });

    renderSea();
    st.textContent=`✓ ${lastSea.length} navi · ${new Date().toLocaleTimeString()}`;
  }catch(e){
    st.textContent="✗ Errore navi: "+e.message;
    console.error(e);
    // Fallback: demo mode con 5 navi simulate nel Mediterraneo
    if(lastSea.length===0){
      lastSea=[
        {mmsi:"247123456",name:"AURORA",lat:43.8,lon:7.8,sog:12,cog:120,shipType:70,navStatus:"In rotta",country:"Italy"},
        {mmsi:"247234567",name:"POSEIDON",lat:44.1,lon:8.3,sog:8,cog:200,shipType:80,navStatus:"In rotta",country:"Italy"},
        {mmsi:"247345678",name:"MSC ROMA",lat:43.5,lon:9.1,sog:18,cog:45,shipType:71,navStatus:"In rotta",country:"Italy"},
        {mmsi:"247456789",name:"TIRRENIA",lat:42.0,lon:11.5,sog:15,cog:310,shipType:60,navStatus:"In rotta",country:"Italy"},
        {mmsi:"247567890",name:"MARINA",lat:44.4,lon:8.9,sog:5,cog:90,shipType:35,navStatus:"In porto",country:"Italy"},
      ];
      renderSea();
      st.textContent="⚠ Dati demo (API AIS temporaneamente non disponibile)";
    }
  }
}

// ══════════════════════════════════════════════════
// VENTO — Open-Meteo con griglia reale 6x6
// ══════════════════════════════════════════════════
async function fetchAndShowWind(){
  const st=document.getElementById("status");
  try{
    st.textContent="Caricamento dati vento…";
    if(windLayer){ map.removeLayer(windLayer); windLayer=null; }

    // Griglia 6x6 punti sull'area Nord Italia
    const lats=[44.0,44.8,45.6,46.4,47.2,48.0];
    const lons=[5.5, 6.8, 8.1, 9.4,10.7,12.0];
    const latStr=lats.join(",");
    const lonStr=lons.join(",");

    const url=`https://api.open-meteo.com/v1/forecast?latitude=${latStr}&longitude=${lonStr}&hourly=windspeed_10m,winddirection_10m&forecast_days=1&timezone=Europe%2FRome&timeformat=unixtime`;
    const res=await fetch(url);
    if(!res.ok) throw new Error("Open-Meteo HTTP "+res.status);
    const data=await res.json();

    // Open-Meteo con più lat/lon restituisce array
    const results=Array.isArray(data)?data:[data];

    const now=Math.floor(Date.now()/1000);
    const uData=[], vData=[];

    results.forEach(loc=>{
      const times=loc.hourly.time;
      let idx=times.findIndex(t=>t>=now);
      if(idx<0) idx=0;
      const spd=loc.hourly.windspeed_10m[idx]/3.6; // km/h → m/s
      const dir=(loc.hourly.winddirection_10m[idx]+180)*Math.PI/180;
      uData.push(spd*Math.sin(dir));
      vData.push(spd*Math.cos(dir));
    });

    // Costruisce griglia NX=6, NY=6 da lomin a lomax
    const nx=6, ny=6;
    const lo1=lons[0], lo2=lons[nx-1];
    const la1=lats[ny-1], la2=lats[0];
    const dx=(lo2-lo1)/(nx-1);
    const dy=(lats[0]-lats[ny-1])/(ny-1);

    // leaflet-velocity: i dati devono essere disposti da (la1_nord, lo1_ovest) → riga per riga verso est, poi verso sud
    // Mappiamo i risultati nella griglia
    const uGrid=[], vGrid=[];
    for(let j=ny-1;j>=0;j--){
      for(let i=0;i<nx;i++){
        const idx=j*nx+i;
        uGrid.push(uData[idx]||0);
        vGrid.push(vData[idx]||0);
      }
    }

    const windJson=[
      {
        header:{
          parameterUnit:"m.s-1", parameterNumber:2, parameterNumberName:"eastward_wind",
          parameterCategory:2, nx, ny,
          lo1, lo2, la1:lats[0], la2:lats[ny-1],
          dx, dy,
          refTime:"2024-01-01 00:00:00"
        },
        data: uGrid
      },
      {
        header:{
          parameterUnit:"m.s-1", parameterNumber:3, parameterNumberName:"northward_wind",
          parameterCategory:2, nx, ny,
          lo1, lo2, la1:lats[0], la2:lats[ny-1],
          dx, dy,
          refTime:"2024-01-01 00:00:00"
        },
        data: vGrid
      }
    ];

    windLayer=L.velocityLayer({
      displayValues:true,
      displayOptions:{
        velocityType:"Vento",
        displayPosition:"bottomleft",
        displayEmptyString:"Nessun dato vento",
        angleConvention:"bearingCCW",
        speedUnit:"k/h"
      },
      data: windJson,
      maxVelocity:25,
      velocityScale:0.008,
      colorScale:["#b3f0ff","#00cfff","#0090ff","#0040e0","#7c4dff"],
      opacity:0.9
    });
    map.addLayer(windLayer);

    const avgSpd=(uData.reduce((a,b)=>a+b,0)/uData.length);
    const avgKmh=(Math.abs(avgSpd)*3.6).toFixed(0);
    st.textContent=`💨 Vento attivo ~${avgKmh} km/h · ${new Date().toLocaleTimeString()}`;
  }catch(e){
    console.error("Wind error:",e);
    st.textContent="✗ Errore vento: "+e.message;
    document.getElementById("btn-wind").className="mode-btn";
    windOn=false;
  }
}

function toggleWind(){
  windOn=!windOn;
  document.getElementById("btn-wind").className="mode-btn"+(windOn?" wind-on":"");
  if(windOn) fetchAndShowWind();
  else{ if(windLayer){ map.removeLayer(windLayer); windLayer=null; } document.getElementById("status").textContent="💨 Vento disattivato."; }
}

// ══════════════════════════════════════════════════
// FILTRI
// ══════════════════════════════════════════════════
function buildFilters(){
  const fg=document.getElementById("fg");
  if(mode==="air"){
    document.getElementById("sb-title").textContent="Voli area locale";
    fg.innerHTML=`
      <div class="fb on"    data-k="civil"  onclick="taf(this)">✈ Civili</div>
      <div class="fb on-mil"data-k="mil"    onclick="taf(this)">🪖 Militari</div>
      <div class="fb on"    data-k="fly"    onclick="taf(this)">🟢 In volo</div>
      <div class="fb on-gnd"data-k="gnd"    onclick="taf(this)">🔴 A terra</div>
      <div class="fb"       data-k="heavy"  onclick="taf(this)">🛫 Solo grandi</div>`;
  } else {
    document.getElementById("sb-title").textContent="Navi area locale";
    fg.innerHTML=`
      <div class="fb on-sea" data-k="cargo"     onclick="tsf(this)">📦 Cargo</div>
      <div class="fb on-sea" data-k="tanker"    onclick="tsf(this)">🛢 Tanker</div>
      <div class="fb on-sea" data-k="passenger" onclick="tsf(this)">🚢 Passeggeri</div>
      <div class="fb on-mil" data-k="military"  onclick="tsf(this)">🪖 Militari</div>
      <div class="fb on"     data-k="other"     onclick="tsf(this)">🔹 Altro</div>`;
  }
}

function taf(btn){
  const k=btn.dataset.k; airFilters[k]=!airFilters[k];
  btn.className="fb"+(airFilters[k]?(k==="mil"?" on-mil":k==="gnd"?" on-gnd":" on"):"");
  renderAir();
}
function tsf(btn){
  const k=btn.dataset.k; seaFilters[k]=!seaFilters[k];
  btn.className="fb"+(seaFilters[k]?(k==="military"?" on-mil":" on-sea"):"");
  renderSea();
}

// ══════════════════════════════════════════════════
// SWITCH MODALITÀ
// ══════════════════════════════════════════════════
let seaTimer=null;
function setMode(m){
  mode=m;
  document.getElementById("btn-air").className="mode-btn"+(m==="air"?" air-on":"");
  document.getElementById("btn-sea").className="mode-btn"+(m==="sea"?" sea-on":"");
  cluster.clearLayers(); trailLayer.clearLayers(); closeDetail();
  clearInterval(airTimer); clearInterval(seaTimer);
  buildFilters();
  if(m==="air"){
    fetchAir();
    airTimer=setInterval(fetchAir,20000);
  } else {
    map.setView([42,12],6);
    fetchSea();
    seaTimer=setInterval(fetchSea,30000);
  }
}

// ══════════════════════════════════════════════════
// AVVIO
// ══════════════════════════════════════════════════
initMap();
buildFilters();
fetchAir();
airTimer=setInterval(fetchAir,20000);
</script>
