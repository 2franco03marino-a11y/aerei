<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>FlyRadar Italia</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css"/>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: system-ui, sans-serif;
  background: #111;
  color: #eee;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

#header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 44px;
  background: #181818;
  border-bottom: 1px solid #333;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  z-index: 2000;
}

#header .title {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.02em;
}

#header .status {
  font-size: 11px;
  color: #aaa;
}

#map {
  position: fixed;
  top: 44px;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 1;
}

#sidebar {
  position: fixed;
  top: 54px;
  right: 10px;
  width: 255px;
  max-height: calc(100vh - 64px);
  background: rgba(13,13,13,0.97);
  border: 1px solid #2a2a2a;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 1500;
}

#sidebar-header {
  padding: 9px 12px;
  background: #161616;
  border-bottom: 1px solid #222;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  font-weight: 700;
}

#sidebar-count {
  background: #ffd500;
  color: #000;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 99px;
}

#sidebar-list {
  overflow-y: auto;
  flex: 1;
  padding: 4px 8px;
}

.f-row {
  padding: 5px 2px;
  border-bottom: 1px solid #1e1e1e;
  cursor: pointer;
  border-radius: 4px;
}

.f-row:hover { background: rgba(255,255,255,0.04); }
.f-row:last-child { border-bottom: none; }

.f-name {
  font-size: 12px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 3px;
}

.f-sub {
  font-size: 10px;
  color: #777;
  margin-top: 1px;
}

.bdg {
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 99px;
  font-weight: 700;
  text-transform: uppercase;
}

.bdg-fly { background: rgba(0,200,80,0.15); color: #00c850; }
.bdg-gnd { background: rgba(255,80,80,0.15); color: #ff5050; }

.no-data {
  font-size: 11px;
  color: #666;
  padding: 10px 4px;
}

/* Cluster giallo */
.marker-cluster-small  { background: rgba(255,213,0,0.45); }
.marker-cluster-small div  { background: rgba(255,213,0,0.9); color:#000; font-weight:700; }
.marker-cluster-medium { background: rgba(255,180,0,0.45); }
.marker-cluster-medium div { background: rgba(255,180,0,0.9); color:#000; font-weight:700; }
.marker-cluster-large  { background: rgba(255,120,0,0.45); }
.marker-cluster-large div  { background: rgba(255,120,0,0.9); color:#000; font-weight:700; }

/* Popup scuro */
.leaflet-popup-content-wrapper {
  background: #1c1c1c !important;
  color: #eee !important;
  border: 1px solid #333 !important;
  border-radius: 8px !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.7) !important;
}
.leaflet-popup-tip { background: #1c1c1c !important; }
.leaflet-popup-close-button { color: #aaa !important; }

.plane-icon {
  transform-origin: center;
}
</style>
</head>

<body>

<div id="header">
  <span class="title">✈ FlyRadar — Nord Italia / Torino</span>
  <span class="status" id="status">Avvio…</span>
</div>

<div id="map"></div>

<div id="sidebar">
  <div id="sidebar-header">
    <span>Voli area locale</span>
    <span id="sidebar-count">0</span>
  </div>
  <div id="sidebar-list">
    <div class="no-data">Caricamento…</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const OPENSKY  = "https://opensky-network.org/api/states/all";
const BBOX     = { lamin:43.5, lamax:48.5, lomin:5.0, lomax:13.5 };
const INTERVAL = 20000; // 20s (risparmia crediti API)

// ─── STATO ────────────────────────────────────────────────
let map;
let cluster;
let states = [];

// ─── MAPPA ────────────────────────────────────────────────
function initMap() {
  map = L.map("map", {
    center: [45.07, 7.68],  // Torino
    zoom: 7,
    zoomControl: true
  });

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "&copy; OpenStreetMap",
    maxZoom: 13,
    minZoom: 3
  }).addTo(map);

  cluster = L.markerClusterGroup({
    maxClusterRadius: 50,
    disableClusteringAtZoom: 9,
    spiderfyOnMaxZoom: true,
    zoomToBoundsOnClick: true,
    polygonOptions: { color:"#ffd500", weight:1, fillOpacity:0.04 }
  });

  map.addLayer(cluster);

  // fix per schermo bianco: forza ricalcolo dimensioni mappa
  setTimeout(() => map.invalidateSize(), 200);
  window.addEventListener("resize", () => map.invalidateSize());
}

// ─── ICONA AEREO ──────────────────────────────────────────
function planeIcon(track) {
  const rot = typeof track === "number" ? track : 0;
  return L.divIcon({
    className: "",
    iconSize:   [22, 22],
    iconAnchor: [11, 11],
    html: `<div class="plane-icon" style="width:22px;height:22px;transform:rotate(${rot}deg);">
      <svg viewBox="0 0 24 24" width="22" height="22" xmlns="http://www.w3.org/2000/svg">
        <path fill="#ffd500" stroke="#000" stroke-width="0.4"
          d="M12 2c-.4 0-.77.24-.92.62L9.2 8.5 4 10.5v1l4.5-.5L11 15l-2.5 2-2 .5v1l3-.3L12 17l2.5 1.2 3 .3v-1l-2-.5L13 15l2.5-4.5L20 11.5v-1L14.8 8.5 12.92 2.62A1 1 0 0 0 12 2z"/>
      </svg>
    </div>`
  });
}

// ─── POPUP ────────────────────────────────────────────────
function popup(s) {
  const cs  = (s[1]||"").trim() || "—";
  const ctr = s[2] || "—";
  const alt = typeof s[7]==="number" ? (s[7]*3.28084).toFixed(0)+" ft" : "—";
  const spd = typeof s[9]==="number" ? (s[9]*1.94384).toFixed(0)+" kt" : "—";
  const hdg = typeof s[10]==="number"? s[10].toFixed(0)+"°" : "—";
  const gnd = s[8] ? "🔴 A terra" : "🟢 In volo";

  return `<div style="font-family:system-ui,sans-serif;min-width:180px;">
    <div style="font-size:14px;font-weight:700;margin-bottom:2px;">${cs}</div>
    <div style="font-size:10px;color:#888;margin-bottom:8px;">ICAO24: ${(s[0]||"").toUpperCase()}</div>
    <table style="font-size:11px;width:100%;border-collapse:collapse;">
      <tr><td style="color:#888;padding:2px 8px 2px 0">Paese</td><td>${ctr}</td></tr>
      <tr><td style="color:#888;padding:2px 8px 2px 0">Quota</td><td>${alt}</td></tr>
      <tr><td style="color:#888;padding:2px 8px 2px 0">Velocità</td><td>${spd}</td></tr>
      <tr><td style="color:#888;padding:2px 8px 2px 0">Prua</td><td>${hdg}</td></tr>
      <tr><td style="color:#888;padding:2px 8px 2px 0">Stato</td><td>${gnd}</td></tr>
    </table>
    <div style="font-size:9px;color:#555;margin-top:8px;">Dati: OpenSky Network</div>
  </div>`;
}

// ─── RENDER MARKER ────────────────────────────────────────
function renderMarkers(list) {
  cluster.clearLayers();

  const markers = [];
  list.forEach(s => {
    if (!s || s.length < 7) return;
    const lat = s[6], lon = s[5];
    if (typeof lat !== "number" || typeof lon !== "number") return;

    const m = L.marker([lat, lon], { icon: planeIcon(s[10]) });
    m.bindPopup(popup(s), { maxWidth: 220 });
    markers.push(m);
  });

  cluster.addLayers(markers); // bulk add = performance
}

// ─── RENDER SIDEBAR ───────────────────────────────────────
function renderSidebar(list) {
  const valid = list.filter(s =>
    s && s.length >= 7 &&
    typeof s[6] === "number" &&
    typeof s[5] === "number"
  );

  document.getElementById("sidebar-count").textContent = valid.length;
  const el = document.getElementById("sidebar-list");
  el.innerHTML = "";

  if (valid.length === 0) {
    el.innerHTML = `<div class="no-data">Nessun volo nell'area.<br>Possibile rate limit API.</div>`;
    return;
  }

  valid.slice(0, 150).forEach(s => {
    const cs  = (s[1]||"").trim() || "Senza callsign";
    const ctr = s[2] || "—";
    const alt = typeof s[7]==="number" ? (s[7]*3.28084).toFixed(0)+" ft" : "—";
    const spd = typeof s[9]==="number" ? (s[9]*1.94384).toFixed(0)+" kt" : "—";
    const gnd = s[8];

    const row = document.createElement("div");
    row.className = "f-row";
    row.innerHTML = `
      <div class="f-name">
        ${cs}
        <span class="bdg ${gnd?"bdg-gnd":"bdg-fly"}">${gnd?"GND":"FLY"}</span>
      </div>
      <div class="f-sub">${ctr} · ${alt} · ${spd}</div>
    `;
    row.onclick = () => {
      map.setView([s[6], s[5]], 10, { animate: true });
    };
    el.appendChild(row);
  });
}

// ─── FETCH VOLI ───────────────────────────────────────────
async function fetchFlights() {
  const url = `${OPENSKY}?lamin=${BBOX.lamin}&lomin=${BBOX.lomin}&lamax=${BBOX.lamax}&lomax=${BBOX.lomax}`;
  const el = document.getElementById("status");

  try {
    el.textContent = "Caricamento…";
    const res = await fetch(url);

    if (res.status === 429) {
      el.textContent = "⚠ Rate limit API. Riprovo tra 20s…";
      return;
    }
    if (!res.ok) throw new Error("HTTP " + res.status);

    const data = await res.json();
    states = Array.isArray(data.states) ? data.states : [];

    renderMarkers(states);
    renderSidebar(states);

    el.textContent = `✓ ${states.length} voli · ${new Date().toLocaleTimeString()}`;
  } catch(e) {
    console.error(e);
    el.textContent = "✗ Errore: " + e.message;
  }
}

// ─── AVVIO ────────────────────────────────────────────────
initMap();
fetchFlights();
setInterval(fetchFlights, INTERVAL);
</script>
</body>
</html>
