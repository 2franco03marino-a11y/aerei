<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>FlyRadar Italia</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css"/>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, sans-serif;
  background: #111;
  color: #eee;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 44px;
  background: #181818;
  border-bottom: 1px solid #333;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  z-index: 2000;
}
#header .title { font-size: 14px; font-weight: 700; }
#header .status { font-size: 11px; color: #aaa; }

#map {
  position: fixed;
  top: 44px; left: 0; right: 0; bottom: 0;
  z-index: 1;
}

#sidebar {
  position: fixed;
  top: 54px; right: 10px;
  width: 265px;
  max-height: calc(100vh - 64px);
  background: rgba(13,13,13,0.97);
  border: 1px solid #2a2a2a;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 1500;
}

#sidebar-header {
  padding: 9px 12px;
  background: #161616;
  border-bottom: 1px solid #222;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
}
#sidebar-count {
  background: #ffd500;
  color: #000;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 99px;
}

/* FILTRI */
#filters {
  padding: 8px 10px;
  border-bottom: 1px solid #222;
  background: #111;
  flex-shrink: 0;
}
#filters .filter-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: #666;
  margin-bottom: 6px;
}
.filter-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.filter-btn {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 99px;
  border: 1px solid #333;
  background: #1a1a1a;
  color: #bbb;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
}
.filter-btn.active {
  background: #ffd500;
  color: #000;
  border-color: #ffd500;
}
.filter-btn.active-mil {
  background: #4caf50;
  color: #000;
  border-color: #4caf50;
}
.filter-btn.active-gnd {
  background: #ff5555;
  color: #fff;
  border-color: #ff5555;
}

#sidebar-list {
  overflow-y: auto;
  flex: 1;
  padding: 4px 8px;
}

.f-row {
  padding: 5px 3px;
  border-bottom: 1px solid #1e1e1e;
  cursor: pointer;
  border-radius: 4px;
}
.f-row:hover { background: rgba(255,255,255,0.04); }
.f-row:last-child { border-bottom: none; }
.f-name { font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 3px; flex-wrap: wrap; }
.f-sub { font-size: 10px; color: #666; margin-top: 1px; }

.bdg {
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 99px;
  font-weight: 700;
  text-transform: uppercase;
}
.bdg-fly { background: rgba(0,200,80,0.15); color: #00c850; }
.bdg-gnd { background: rgba(255,80,80,0.15); color: #ff5050; }
.bdg-mil { background: rgba(76,175,80,0.2); color: #4caf50; }

.no-data { font-size: 11px; color: #555; padding: 10px 4px; }

/* CLUSTER */
.marker-cluster-small  { background: rgba(255,213,0,0.4); }
.marker-cluster-small div  { background: rgba(255,213,0,0.9); color:#000; font-weight:700; }
.marker-cluster-medium { background: rgba(255,170,0,0.4); }
.marker-cluster-medium div { background: rgba(255,170,0,0.9); color:#000; font-weight:700; }
.marker-cluster-large  { background: rgba(255,100,0,0.4); }
.marker-cluster-large div  { background: rgba(255,100,0,0.9); color:#000; font-weight:700; }

/* POPUP */
.leaflet-popup-content-wrapper {
  background: #1c1c1c !important;
  color: #eee !important;
  border: 1px solid #333 !important;
  border-radius: 10px !important;
  box-shadow: 0 4px 24px rgba(0,0,0,0.8) !important;
  padding: 0 !important;
}
.leaflet-popup-content { margin: 0 !important; }
.leaflet-popup-tip { background: #1c1c1c !important; }
.leaflet-popup-close-button { color: #888 !important; top: 8px !important; right: 8px !important; }
</style>
</head>

<body>
<div id="header">
  <span class="title">✈ FlyRadar — Nord Italia / Torino</span>
  <span class="status" id="status">Avvio…</span>
</div>

<div id="map"></div>

<div id="sidebar">
  <div id="sidebar-header">
    <span>Voli area locale</span>
    <span id="sidebar-count">0</span>
  </div>

  <!-- FILTRI -->
  <div id="filters">
    <div class="filter-title">Filtri visualizzazione</div>
    <div class="filter-grid">
      <div class="filter-btn active" data-filter="civil"   onclick="toggleFilter(this)">✈ Civili</div>
      <div class="filter-btn active active-mil" data-filter="mil" onclick="toggleFilter(this)">🪖 Militari</div>
      <div class="filter-btn active" data-filter="fly"    onclick="toggleFilter(this)">🟢 In volo</div>
      <div class="filter-btn active-gnd" data-filter="gnd" onclick="toggleFilter(this)">🔴 A terra</div>
      <div class="filter-btn" data-filter="heavy"         onclick="toggleFilter(this)">🛫 Solo grandi</div>
    </div>
  </div>

  <div id="sidebar-list">
    <div class="no-data">Caricamento…</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const OPENSKY  = "https://opensky-network.org/api/states/all";
const BBOX     = { lamin:43.5, lamax:48.5, lomin:5.0, lomax:13.5 };
const INTERVAL = 20000;

// Range ICAO24 militari noti (prefissi esadecimali per paese)
// Fonti: adsbexchange, comunità ADS-B [web:64][web:66]
const MIL_PREFIXES = [
  "ae","a1","a2","a3","a4","a5",  // US military (AE****)
  "43c","43d","43e","43f",         // Germania militare
  "3b7","3b8","3b9","3ba","3bb",   // Francia militare
  "43b","43a",                     // Germania
  "0100","0101","0102","0103",     // NATO
  "4240","4241","4242","4243","4244","4245", // UK RAF
  "300","301","302",               // Italia militare (AMI)
  "500","501",                     // Russia militare
];

// Callsign prefix militari comuni
const MIL_CALLSIGNS = [
  "RCH","DUKE","REACH","JAKE","FURY","VIPER","GHOST","EAGLE",
  "VENUS","MARS","ATLAS","MAGMA","TOPGUN","KNIFE","IRON","STEEL",
  "AMI","IAM","IFC","ITA","GAF","RAF","USAF","NAVY"
];

// ─── STATO FILTRI ────────────────────────────────────────
const filters = {
  civil: true,
  mil:   true,
  fly:   true,
  gnd:   false,
  heavy: false
};

function toggleFilter(btn) {
  const key = btn.dataset.filter;
  filters[key] = !filters[key];

  // stile attivo dipende dal tipo
  if (filters[key]) {
    if (key === "mil")   btn.className = "filter-btn active active-mil";
    else if (key === "gnd") btn.className = "filter-btn active active-gnd";
    else                 btn.className = "filter-btn active";
  } else {
    btn.className = "filter-btn";
  }

  renderMarkers(lastStates);
  renderSidebar(lastStates);
}

// ─── STATO APP ────────────────────────────────────────────
let map, clusterGroup, trailLayer;
let lastStates = [];
let selectedIcao = null;

// ─── MAPPA ────────────────────────────────────────────────
function initMap() {
  map = L.map("map", { center:[45.07,7.68], zoom:7, zoomControl:true });

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "&copy; OpenStreetMap",
    maxZoom:13, minZoom:3
  }).addTo(map);

  // layer per la traiettoria
  trailLayer = L.layerGroup().addTo(map);

  clusterGroup = L.markerClusterGroup({
    maxClusterRadius: 50,
    disableClusteringAtZoom: 9,
    spiderfyOnMaxZoom: true,
    zoomToBoundsOnClick: true,
    polygonOptions: { color:"#ffd500", weight:1, fillOpacity:0.04 }
  });
  map.addLayer(clusterGroup);

  // click su mappa = deseleziona e rimuove trail
  map.on("click", () => {
    trailLayer.clearLayers();
    selectedIcao = null;
  });

  setTimeout(() => map.invalidateSize(), 200);
  window.addEventListener("resize", () => map.invalidateSize());
}

// ─── UTILITY: DETECT MILITARE ────────────────────────────
function isMilitary(s) {
  const icao = (s[0] || "").toLowerCase();
  const cs   = (s[1] || "").trim().toUpperCase();

  // check prefisso ICAO24
  for (const pref of MIL_PREFIXES) {
    if (icao.startsWith(pref)) return true;
  }
  // check callsign
  for (const pfx of MIL_CALLSIGNS) {
    if (cs.startsWith(pfx)) return true;
  }
  return false;
}

// category 5/6 = heavy/high vortex (grandi aerei) [web:3]
function isHeavy(s) {
  const cat = s.length >= 18 ? s[17] : null;
  if (typeof cat === "number") return cat === 5 || cat === 6;
  // fallback: quota alta + velocità alta → probabile wide-body
  const alt = s[7];
  const spd = s[9];
  return typeof alt === "number" && typeof spd === "number"
         && alt > 9000 && spd > 220;
}

// ─── FILTRO STATO ────────────────────────────────────────
function passFilter(s) {
  const mil = isMilitary(s);
  const gnd = s[8];

  if (!filters.civil  && !mil) return false;
  if (!filters.mil    && mil)  return false;
  if (!filters.fly    && !gnd) return false;
  if (!filters.gnd    && gnd)  return false;
  if (filters.heavy   && !isHeavy(s)) return false;

  return true;
}

// ─── ICONA AEREO SVG ─────────────────────────────────────
function planeIcon(track, mil) {
  const rot   = typeof track === "number" ? track : 0;
  const color = mil ? "#4caf50" : "#ffd500";
  return L.divIcon({
    className: "",
    iconSize:   [22,22],
    iconAnchor: [11,11],
    html: `<div style="width:22px;height:22px;transform:rotate(${rot}deg);transform-origin:center;">
      <svg viewBox="0 0 24 24" width="22" height="22" xmlns="http://www.w3.org/2000/svg">
        <path fill="${color}" stroke="#000" stroke-width="0.5"
          d="M12 2c-.4 0-.77.24-.92.62L9.2 8.5 4 10.5v1l4.5-.5L11 15l-2.5 2-2 .5v1l3-.3L12 17l2.5 1.2 3 .3v-1l-2-.5L13 15l2.5-4.5L20 11.5v-1L14.8 8.5 12.92 2.62A1 1 0 0 0 12 2z"/>
      </svg>
    </div>`
  });
}

// ─── TRAIETTORIA (stima dalla prua) ──────────────────────
function drawTrail(s) {
  trailLayer.clearLayers();
  const lat   = s[6], lon = s[5];
  const track = typeof s[10] === "number" ? s[10] : 0;
  const spd   = typeof s[9]  === "number" ? s[9]  : 200; // m/s
  if (typeof lat !== "number" || typeof lon !== "number") return;

  // Stima posizione nei prossimi 5/10/20 minuti
  const steps = [5, 10, 20];
  const toRad = d => d * Math.PI / 180;
  const toDeg = r => r * 180 / Math.PI;
  const R = 6371000;

  const points = [[lat, lon]];

  steps.forEach(min => {
    const dist = spd * min * 60; // metri
    const bearRad = toRad(track);
    const latRad  = toRad(lat);
    const lonRad  = toRad(lon);
    const d = dist / R;

    const lat2 = Math.asin(
      Math.sin(latRad) * Math.cos(d) +
      Math.cos(latRad) * Math.sin(d) * Math.cos(bearRad)
    );
    const lon2 = lonRad + Math.atan2(
      Math.sin(bearRad) * Math.sin(d) * Math.cos(latRad),
      Math.cos(d) - Math.sin(latRad) * Math.sin(lat2)
    );
    points.push([toDeg(lat2), toDeg(lon2)]);
  });

  // Linea tratteggiata
  L.polyline(points, {
    color: "#ffd500",
    weight: 2,
    opacity: 0.85,
    dashArray: "8 6"
  }).addTo(trailLayer);

  // Freccia finale
  const last = points[points.length - 1];
  L.circleMarker(last, {
    radius: 4,
    color: "#ffd500",
    fillColor: "#ffd500",
    fillOpacity: 0.9,
    weight: 1
  }).addTo(trailLayer);

  // Mini etichette tempo
  points.slice(1).forEach((pt, i) => {
    L.marker(pt, {
      icon: L.divIcon({
        className: "",
        html: `<div style="
          font-size:10px;font-weight:700;
          color:#ffd500;
          text-shadow:0 0 4px #000,0 0 4px #000;
          white-space:nowrap;
          margin-left:6px;">
          +${steps[i]}min
        </div>`,
        iconAnchor: [0, 8]
      })
    }).addTo(trailLayer);
  });
}

// ─── POPUP CON IMMAGINE ──────────────────────────────────
function buildPopup(s, mil) {
  const icao24 = (s[0] || "").toUpperCase();
  const cs     = (s[1] || "").trim() || "Senza callsign";
  const ctr    = s[2]  || "—";
  const alt    = typeof s[7]==="number" ? (s[7]*3.28084).toFixed(0)+" ft" : "—";
  const spd    = typeof s[9]==="number" ? (s[9]*1.94384).toFixed(0)+" kt" : "—";
  const hdg    = typeof s[10]==="number"? s[10].toFixed(0)+"°" : "—";
  const gnd    = s[8] ? "🔴 A terra" : "🟢 In volo";
  const milTag = mil ? `<span class="bdg bdg-mil" style="font-size:10px;padding:2px 6px;">🪖 Militare</span>` : "";

  // Planespotters.net API: foto aerei gratuita per icao24 [web:64]
  const imgUrl = `https://api.planespotters.net/pub/photos/hex/${(s[0]||"").toLowerCase()}`;

  const id = "popup-img-" + (s[0] || "").toLowerCase();

  // carica immagine async
  setTimeout(() => {
    fetch(imgUrl)
      .then(r => r.json())
      .then(data => {
        const el = document.getElementById(id);
        if (!el) return;
        const photos = data.photos;
        if (photos && photos.length > 0) {
          const thumb = photos[0].thumbnail_large?.src || photos[0].thumbnail?.src;
          if (thumb) {
            el.innerHTML = `<img src="${thumb}"
              style="width:100%;border-radius:6px;margin-bottom:8px;display:block;"
              onerror="this.parentElement.style.display='none'" />`;
          } else {
            el.style.display = "none";
          }
        } else {
          el.style.display = "none";
        }
      })
      .catch(() => {
        const el = document.getElementById(id);
        if (el) el.style.display = "none";
      });
  }, 100);

  return `<div style="font-family:system-ui,sans-serif;padding:12px 14px;min-width:200px;max-width:230px;">
    <div id="${id}" style="min-height:20px;margin-bottom:4px;">
      <div style="font-size:10px;color:#555;padding:4px 0;">Caricamento foto…</div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
      <div style="font-size:15px;font-weight:700;">${cs}</div>
      ${milTag}
    </div>
    <div style="font-size:10px;color:#666;margin-bottom:8px;">ICAO24: ${icao24}</div>
    <table style="font-size:11px;width:100%;border-collapse:collapse;">
      <tr><td style="color:#666;padding:2px 10px 2px 0;">Paese</td><td style="color:#ddd">${ctr}</td></tr>
      <tr><td style="color:#666;padding:2px 10px 2px 0;">Quota</td><td style="color:#ddd">${alt}</td></tr>
      <tr><td style="color:#666;padding:2px 10px 2px 0;">Velocità</td><td style="color:#ddd">${spd}</td></tr>
      <tr><td style="color:#666;padding:2px 10px 2px 0;">Prua</td><td style="color:#ddd">${hdg}</td></tr>
      <tr><td style="color:#666;padding:2px 10px 2px 0;">Stato</td><td>${gnd}</td></tr>
    </table>
    <div style="font-size:9px;color:#444;margin-top:10px;">Dati: OpenSky Network · Foto: Planespotters.net</div>
  </div>`;
}

// ─── RENDER MARKER ────────────────────────────────────────
function renderMarkers(states) {
  clusterGroup.clearLayers();
  trailLayer.clearLayers();
  selectedIcao = null;

  const batch = [];
  states.forEach(s => {
    if (!s || s.length < 7) return;
    const lat = s[6], lon = s[5];
    if (typeof lat !== "number" || typeof lon !== "number") return;
    if (!passFilter(s)) return;

    const mil = isMilitary(s);
    const m = L.marker([lat, lon], { icon: planeIcon(s[10], mil) });
    m.bindPopup(buildPopup(s, mil), { maxWidth:240 });

    m.on("click", () => {
      selectedIcao = s[0];
      drawTrail(s);
    });

    batch.push(m);
  });

  clusterGroup.addLayers(batch);
}

// ─── RENDER SIDEBAR ───────────────────────────────────────
function renderSidebar(states) {
  const valid = states.filter(s =>
    s && s.length >= 7 &&
    typeof s[6] === "number" &&
    typeof s[5] === "number" &&
    passFilter(s)
  );

  document.getElementById("sidebar-count").textContent = valid.length;
  const el = document.getElementById("sidebar-list");
  el.innerHTML = "";

  if (valid.length === 0) {
    el.innerHTML = `<div class="no-data">Nessun volo con questi filtri.<br>O rate limit API raggiunto.</div>`;
    return;
  }

  valid.slice(0, 150).forEach(s => {
    const cs  = (s[1]||"").trim() || "Senza callsign";
    const ctr = s[2] || "—";
    const alt = typeof s[7]==="number" ? (s[7]*3.28084).toFixed(0)+" ft" : "—";
    const spd = typeof s[9]==="number" ? (s[9]*1.94384).toFixed(0)+" kt" : "—";
    const gnd = s[8];
    const mil = isMilitary(s);

    const row = document.createElement("div");
    row.className = "f-row";
    row.innerHTML = `
      <div class="f-name">
        ${cs}
        <span class="bdg ${gnd?"bdg-gnd":"bdg-fly"}">${gnd?"GND":"FLY"}</span>
        ${mil?`<span class="bdg bdg-mil">MIL</span>`:""}
      </div>
      <div class="f-sub">${ctr} · ${alt} · ${spd}</div>
    `;
    row.onclick = () => {
      if (typeof s[6]==="number" && typeof s[5]==="number") {
        map.setView([s[6], s[5]], 10, { animate:true });
        drawTrail(s);
        selectedIcao = s[0];
      }
    };
    el.appendChild(row);
  });
}

// ─── FETCH ────────────────────────────────────────────────
async function fetchFlights() {
  const url = `${OPENSKY}?lamin=${BBOX.lamin}&lomin=${BBOX.lomin}&lamax=${BBOX.lamax}&lomax=${BBOX.lomax}`;
  const el  = document.getElementById("status");
  try {
    el.textContent = "Caricamento…";
    const res = await fetch(url);
    if (res.status === 429) {
      el.textContent = "⚠ Rate limit API. Riprovo tra 20s…"; return;
    }
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data  = await res.json();
    lastStates  = Array.isArray(data.states) ? data.states : [];
    renderMarkers(lastStates);
    renderSidebar(lastStates);
    el.textContent = `✓ ${lastStates.length} voli · ${new Date().toLocaleTimeString()}`;
  } catch(e) {
    console.error(e);
    el.textContent = "✗ Errore: " + e.message;
  }
}

// ─── AVVIO ────────────────────────────────────────────────
initMap();
fetchFlights();
setInterval(fetchFlights, INTERVAL);
</script>
</body>
</html>
